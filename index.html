// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 DOWNLOAD LINKS ENGINE \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
async function fetchDownloadLinks(media,type){
  const cont=$('dl-links-container');
  if(!cont)return;
  const title=media.title||media.name||'';
  const year=(media.release_date||media.first_air_date||'').split('-')[0];
  const tmdbId=media.id;
  const isAr=S.lang==='ar';
  const season=getV('ssel','1');
  const episode=getV('esel','1');

  // Skeleton
  cont.innerHTML=renderDlSkeleton();

  // Parallel fetch
  const [ytsData,subData]=await Promise.all([
    type==='movie'?fetchYTS(title,year):Promise.resolve(null),
    fetchSubdlSubs(title,year,tmdbId,type,season,episode),
  ]);

  let html='';

  // \u2550\u2550 MOVIES: YTS quality picker \u2550\u2550
  if(type==='movie'&&ytsData&&ytsData.torrents&&ytsData.torrents.length){
    const dlLbl=isAr?'\u0627\u062E\u062A\u0631 \u0627\u0644\u062C\u0648\u062F\u0629':'\u25BC Choose Quality';
    html+=`<div class="dl-divider-lbl">${dlLbl}</div>`;
    const order={'2160p':0,'1080p.bluray':1,'1080p.web':2,'1080p':3,'720p.bluray':4,'720p.web':5,'720p':6,'480p':7};
    const sorted=[...ytsData.torrents].sort((a,b)=>{
      const ka=(a.quality+(a.type?'.'+a.type:'')).toLowerCase();
      const kb=(b.quality+(b.type?'.'+b.type:'')).toLowerCase();
      return (order[ka]??8)-(order[kb]??8);
    });
    html+=sorted.map(t=>{
      const qc=t.quality==='2160p'?'q4k':t.quality==='1080p'?'q1080':t.quality==='720p'?'q720':'q480';
      const sizeMB=t.size_bytes?Math.round(t.size_bytes/1048576):0;
      const sizeStr=sizeMB>1024?(sizeMB/1024).toFixed(1)+' GB':sizeMB+' MB';
      const typeStr=t.type&&t.type!=='web'?t.type.toUpperCase():'';
      const hash=t.hash;
      const encodedName=encodeURIComponent(ytsData.title_english||title);
      return `<div class="dl-link-item" onclick="startMagnet('${hash}','${encodedName}',event)" style="cursor:pointer">
        <div class="dl-link-left">
          <div class="dl-link-title">${t.quality}${typeStr?' \u00B7 '+typeStr:''}</div>
          <div class="dl-link-meta">${sizeStr} \u00B7 ${isAr?'\u062A\u0648\u0631\u0646\u062A \u0645\u0628\u0627\u0634\u0631':'Direct Magnet'}</div>
        </div>
        <div class="dl-link-right">
          <span class="dl-badge ${qc}">${t.quality}</span>
          <span class="dl-badge torr">\u2193</span>
        </div>
      </div>`;
    }).join('');
    // YTS page
    const ytsUrl=ytsData.url||`https://yts.mx/movies/${(title||'').toLowerCase().replace(/[^a-z0-9]+/g,'-')}-${year}`;
    const ytsLbl=isAr?'\u0639\u0631\u0636 \u0639\u0644\u0649 YTS':'View on YTS';
    html+=`<a class="dl-link-item" href="${ytsUrl}" target="_blank" rel="noopener" style="margin-top:4px">
      <div class="dl-link-left"><div class="dl-link-title">${ytsLbl}</div><div class="dl-link-meta">yts.mx</div></div>
      <div class="dl-link-right"><span class="dl-badge q1080">YTS</span></div></a>`;
  } else {
    // Not on YTS or TV series
    const fb=isAr
      ?(type==='movie'?'\u0644\u0645 \u064A\u0648\u062C\u062F \u0639\u0644\u0649 YTS \u2014 \u0628\u062F\u0627\u0626\u0644':'\u0631\u0648\u0627\u0628\u0637 \u062A\u062D\u0645\u064A\u0644 \u0627\u0644\u0645\u0633\u0644\u0633\u0644')
      :(type==='movie'?'Not on YTS \u2014 Try these':'Series Download Links');
    if(type==='movie'){
      // Show YTS search link directly
      const ytsSearch=`https://yts.mx/browse-movies/${encodeURIComponent(title)}/all/all/0/latest`;
      html+=`<a class="dl-link-item" href="${ytsSearch}" target="_blank" rel="noopener">
        <div class="dl-link-left">
          <div class="dl-link-title">${isAr?'\u0628\u062D\u062B \u0639\u0644\u0649 YTS':'Search on YTS'}</div>
          <div class="dl-link-meta">yts.mx \u00B7 ${isAr?'\u0642\u062F \u064A\u0643\u0648\u0646 \u062A\u062D\u062A \u0627\u0633\u0645 \u0645\u062E\u062A\u0644\u0641':'May be listed under different name'}</div>
        </div>
        <div class="dl-link-right"><span class="dl-badge q1080">YTS</span><span class="dl-badge torr">\u2193</span></div>
      </a>`;
    }
    html+=`<div class="dl-divider-lbl">${fb}</div>`;
    html+=renderFallbackLinks(title,year,type,season,episode,isAr);
  }

  // \u2550\u2550 ARABIC SUBTITLES \u2550\u2550
  const subLbl=isAr?'\u0627\u0644\u062A\u0631\u062C\u0645\u0629 \u0627\u0644\u0639\u0631\u0628\u064A\u0629':'Arabic Subtitles';
  html+=`<div class="dl-divider-lbl">${subLbl}</div>`;
  if(subData&&subData.length){
    html+=subData.slice(0,6).map(sub=>{
      const dlUrl=sub.url?'https://dl.subdl.com'+sub.url:'';
      const name=(sub.release_name||sub.name||'Arabic Subtitle').substring(0,48);
      return `<a class="dl-link-item" ${dlUrl?`href="${dlUrl}" download`:`href="https://subdl.com" target="_blank"`} rel="noopener">
        <div class="dl-link-left">
          <div class="dl-link-title">${name}</div>
          <div class="dl-link-meta">Subdl.com \u00B7 SRT</div>
        </div>
        <div class="dl-link-right">
          <span class="dl-badge ar">${isAr?'\u0639\u0631\u0628\u064A':'AR'}</span>
          <span class="dl-badge sub">\u2193 SRT</span>
        </div></a>`;
    }).join('');
  } else {
    html+=renderSubtitleLinks(title,media.imdb_id||'',isAr);
  }

  cont.innerHTML=html;
}

async function fetchYTS(title,year){
  try{
    const imdbId=S.cur?.imdb_id;
    // Try 3 methods for best match
    const attempts=[];
    // 1. By IMDb ID (most accurate)
    if(imdbId) attempts.push(`https://yts.mx/api/v2/list_movies.json?query_term=${imdbId}&limit=1`);
    // 2. By title + year
    attempts.push(`https://yts.mx/api/v2/list_movies.json?query_term=${encodeURIComponent(title)}&limit=20`);
    // 3. By title only (without year - catches more results)
    attempts.push(`https://yts.mx/api/v2/list_movies.json?query_term=${encodeURIComponent(title.replace(/[:\-]/g,' ').trim())}&limit=20`);

    for(const url of attempts){
      try{
        const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
        const data=await r.json();
        if(!data?.data?.movies?.length) continue;
        const movies=data.data.movies;
        // Best match: same year first, then any
        const byYear=movies.filter(m=>String(m.year)===String(year));
        const match=byYear.length?byYear[0]:movies[0];
        if(match?.torrents?.length) return match;
      }catch(ex){continue;}
    }
    return null;
  }catch(e){return null;}
}

async function fetchSubdlSubs(title,year,tmdbId,type,season,episode){
  try{
    const imdbId=S.cur?.imdb_id||'';
    // Subdl free API
    let url='https://api.subdl.com/api/v1/subtitles?languages=AR&';
    if(imdbId) url+=`imdb_id=${imdbId}&`;
    else       url+=`tmdb_id=${tmdbId}&film_name=${encodeURIComponent(title)}&year=${year}&`;
    if(type==='tv') url+=`season_number=${season}&episode_number=${episode}&`;
    url+='type='+(type==='movie'?'movie':'tv');
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!r.ok) return [];
    const data=await r.json();
    return data.subtitles||[];
  }catch(e){return[];}
}

function startMagnet(hash,name,evt){
  if(evt)evt.preventDefault();
  const mag=`magnet:?xt=urn:btih:${hash}&dn=${name}&tr=udp://open.demonii.com:1337/announce&tr=udp://tracker.openbittorrent.com:80&tr=udp://tracker.coppersurfer.tk:6969&tr=udp://tracker.opentrackr.org:1337/announce&tr=udp://glotorrents.pw:6969/announce`;
  window.location.href=mag;
  toast(S.lang==='ar'?'\u062C\u0627\u0631\u064A \u0641\u062A\u062D \u0639\u0645\u064A\u0644 \u0627\u0644\u062A\u0648\u0631\u0646\u062A...':'Opening torrent client...');
}

function renderFallbackLinks(title,year,type,season,episode,isAr){
  const ep=type==='tv'?` S${String(season).padStart(2,'0')}E${String(episode).padStart(2,'0')}`:' ';
  const q=encodeURIComponent(title+' '+year+ep);
  return [
    {label:isAr?'1337x \u2014 \u0645\u062F\u0628\u0644\u062C \u0639\u0631\u0628\u064A':'1337x \u2014 Arabic',url:`https://1337x.to/search/${q}+arabic/1/`,q:'torr',ar:true},
    {label:isAr?'Torrent Galaxy':'Torrent Galaxy',url:`https://torrentgalaxy.to/torrents.php?search=${encodeURIComponent(title+' '+year+ep)}`,q:'torr',ar:false},
    {label:isAr?'Google \u2014 \u0645\u062F\u0628\u0644\u062C 1080p':'Google \u2014 Dubbed 1080p',url:`https://www.google.com/search?q=${encodeURIComponent(title+' '+year+ep+' arabic dubbed 1080p')}`,q:'q1080',ar:true},
  ].map(lk=>`<a class="dl-link-item" href="${lk.url}" target="_blank" rel="noopener">
    <div class="dl-link-left"><div class="dl-link-title">${lk.label}</div><div class="dl-link-meta">${lk.url.split('/')[2]}</div></div>
    <div class="dl-link-right">${lk.ar?`<span class="dl-badge ar">${isAr?'\u0639\u0631\u0628\u064A':'AR'}</span>`:''}<span class="dl-badge ${lk.q}">\u2193</span></div>
  </a>`).join('');
}

function renderSubtitleLinks(title,imdbId,isAr){
  const q=encodeURIComponent(title);
  return [
    {n:'Subdl',url:`https://subdl.com/s/${q}`},
    {n:'OpenSubtitles',url:`https://www.opensubtitles.org/ar/search/sublanguageid-ara/moviename-${q}`},
    {n:'Subscene',url:`https://subscene.com/subtitles/searchbytitle?query=${q}&l=Arabic`},
    {n:'Yify Subs',url:imdbId?`https://yifysubtitles.ch/movie-imdb/${imdbId}`:`https://yifysubtitles.ch/search?q=${q}`},
  ].map(s=>`<a class="dl-link-item" href="${s.url}" target="_blank" rel="noopener">
    <div class="dl-link-left"><div class="dl-link-title">${isAr?'\u062A\u0631\u062C\u0645\u0629 \u0639\u0631\u0628\u064A\u0629 \u2014 ':'Arabic \u2014 '}${s.n}</div><div class="dl-link-meta">${s.n}</div></div>
    <div class="dl-link-right"><span class="dl-badge ar">${isAr?'\u0639\u0631\u0628\u064A':'AR'}</span><span class="dl-badge sub">SRT</span></div>
  </a>`).join('');
}

async function _saveMetaToOffline(sid,type,title,s,e,streamUrl){
  let posterData='';
  if(S.cur&&S.cur.poster_path){
    try{
      const r=await fetch(IMG+S.cur.poster_path);
      const blob=await r.blob();
      posterData=await new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.readAsDataURL(blob);});
    }catch(ex){}
  }
  await saveOItem({
    id:`${sid}-${type}`,tmdbId:sid,mediaType:type,title,
    overview:(S.cur?.overview||'').substring(0,300),
    posterData,posterPath:S.cur?.poster_path||'',
    voteAverage:S.cur?.vote_average||0,
    year:(S.cur?.release_date||S.cur?.first_air_date||'').split('-')[0],
    genres:(S.cur?.genres||[]).slice(0,3).map(g=>g.name),
    streamUrl,season:s,episode:e,savedAt:Date.now()
  });
}

async function renderOfflineSection(container){
  try{
    const items=await getOItems();
    if(!items.length)return;
    const div=document.createElement('div');
    div.innerHTML=`<div class="section" style="margin-top:24px"><div class="section-head"><div class="section-title">\u2B07\uFE0F ${L('dlList')}</div></div><div class="wl-grid">${items.map(item=>`<div style="position:relative"><div class="card cgc" onclick="playOfflineItem('${item.streamUrl.replace(/'/g,"\'")}','${(item.title||'').replace(/'/g,"\'")}')"><div class="card-img"><img src="${item.posterData||'https://placehold.co/300x450/161628/555?text=?'}" alt="" loading="lazy"><div class="card-overlay"><div class="card-play"><svg width="12" height="12" fill="white" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg></div></div><div class="offline-badge">OFFLINE</div>${item.voteAverage?`<div class="card-score">\u2605 ${parseFloat(item.voteAverage).toFixed(1)}</div>`:''}</div><div class="card-body"><div class="card-title">${item.title||''}</div><div class="card-year">${item.year||''}</div></div></div><button onclick="deleteOfflineItem('${item.id}')" style="position:absolute;top:6px;right:6px;z-index:5;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.8);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer">\u2715</button></div>`).join('')}</div></div>`;
    container.appendChild(div);
  }catch(ex){console.warn(ex);}
}
function playOfflineItem(streamUrl,title){
  const m=$('pm');m.classList.remove('gone');m.classList.add('open');
  setT('ptxt',title);setT('pmttl',title);
  stopNativePlayer();
  const ld=$('ld');if(ld)ld.style.display='flex';
  setStatus('try','Loading\u2026');
  const f=$('vf');f.onload=null;f.onerror=null;f.style.display='';f.src='about:blank';
  setTimeout(()=>{f.src=streamUrl;f.onload=()=>{if(ld)ld.style.display='none';setStatus('ok','\u25B6 Offline');};},80);
}
async function deleteOfflineItem(id){
  await deleteOItem(id);
  toast('\uD83D\uDDD1\uFE0F '+(S.lang==='ar'?'\u062A\u0645 \u0627\u0644\u062D\u0630\u0641':'Removed'));
  renderWatchlist();
}

// postMessage listener (VidSrc events)
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
window.addEventListener('message',evt=>{
  try{
    const d=typeof evt.data==='string'?JSON.parse(evt.data):evt.data;
    if(!d)return;
    if(d.type==='PLAYER_EVENT'||d.type==='vidlink_progress'||d.status==='MEDIA_READY'){
      const ld=$('ld');if(ld)ld.style.display='none';
      setStatus('ok',`\u25B6 ${SRVS[S.srvIdx]?.n||'Streaming'}`);
    }
    // If server sends M3U8 URL via postMessage
    let streamUrl=null,subs=[];
    if(d.stream){streamUrl=d.stream;subs=d.subtitles||[];}
    else if(d.type==='MEDIA_DATA'&&d.data?.stream){streamUrl=d.data.stream;subs=d.data.subtitles||[];}
    else if(d.url&&typeof d.url==='string'&&(d.url.includes('.m3u8')||d.url.includes('.mp4'))){streamUrl=d.url;}
    if(streamUrl){clearTimeout(S.srvTimer);initNativePlayer(streamUrl,subs);}
  }catch(e){}
});

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
