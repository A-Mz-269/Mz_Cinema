<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#08080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mz Cinema</title>
<link rel="manifest" id="mf">
<script>try{const m={name:"Mz Cinema",short_name:"Mz Cinema",start_url:".",display:"standalone",background_color:"#08080f",theme_color:"#08080f",icons:[{src:"https://image.tmdb.org/t/p/original/u3bZgnGQ9T01sWNhyve4zSgrIbB.jpg",sizes:"512x512",type:"image/jpeg"}]};document.getElementById('mf').setAttribute('href',URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'})));}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ═══════════════ RESET & TOKENS ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand */
  --red:#E50914;
  --red-a:.14;
  --red-dim:rgba(229,9,20,.14);
  --red-glow:rgba(229,9,20,.30);
  --gold:#f5c518;

  /* Dark surfaces */
  --bg:#08080f;
  --s0:#0b0b15;
  --s1:#0f0f1c;
  --s2:#141428;
  --s3:#1a1a32;
  --s4:#22223c;
  --s5:#2c2c48;

  /* Text */
  --t1:#f0f0f8;
  --t2:#a0a0c0;
  --t3:#606080;

  /* Utility */
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --glass:rgba(11,11,21,.88);
  --glass2:rgba(8,8,15,.94);

  /* Layout */
  --sidebar:260px;
  --radius:12px;
  --radius-sm:8px;
  --radius-lg:16px;

  /* Transitions */
  --ease:cubic-bezier(.4,0,.2,1);
  --fast:.15s;
  --mid:.25s;
  --slow:.35s;
}
html[data-theme=light]{
  --bg:#f0f0f8;
  --s0:#ffffff;
  --s1:#f8f8ff;
  --s2:#ebebf5;
  --s3:#dcdcec;
  --s4:#cdcde0;
  --s5:#bdbdd4;
  --t1:#090912;
  --t2:#505070;
  --t3:#909090;
  --border:rgba(0,0,0,.07);
  --border2:rgba(0,0,0,.12);
  --glass:rgba(240,240,248,.9);
  --glass2:rgba(240,240,248,.97);
}

/* ═══════════════ ARABIC ═══════════════ */
body.ar,body.ar *{font-family:'Cairo',sans-serif!important}
body.ar{direction:rtl}
body.ar .sidebar{left:auto;right:0;border-right:none;border-left:1px solid var(--border)}
body.ar #app{margin-left:0}
@media(min-width:768px){body.ar #app{margin-right:var(--sidebar)}}
body.ar .nav-item{text-align:right}
body.ar .macts{flex-direction:row-reverse}
body.ar .hs,.body.ar .cast-scroll{direction:ltr}
body.ar .search-header{flex-direction:row-reverse}
body.ar #si{padding:11px 44px 11px 14px;text-align:right}
body.ar .si-icon{left:auto;right:14px}
body.ar .chip-bar{direction:ltr}

/* ═══════════════ BASE ═══════════════ */
html,body{overscroll-behavior-y:none}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);color:var(--t1);
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;min-height:100dvh;
  transition:background var(--mid) var(--ease),color var(--mid) var(--ease);
}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--s5);border-radius:4px}

/* ═══════════════ SIDEBAR ═══════════════ */
.sidebar{
  position:fixed;inset-y:0;left:0;width:var(--sidebar);
  background:var(--s0);border-right:1px solid var(--border);
  display:none;flex-direction:column;padding:18px 10px;
  z-index:50;overflow-y:auto;
  transition:background var(--mid);
}
@media(min-width:768px){.sidebar{display:flex}}

.sb-logo{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px 22px;cursor:pointer;
}
.sb-logo-text{
  font-family:'Bebas Neue',sans-serif;font-size:24px;
  letter-spacing:3px;line-height:1;
}
.sb-logo-text em{color:var(--red);font-style:normal}
.sb-logo-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--red);
  box-shadow:0 0 8px var(--red-glow);
  flex:none;margin-top:-12px;
}

.sb-section{
  font-size:9px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--t3);
  padding:0 12px;margin:14px 0 4px;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 12px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;color:var(--t2);
  transition:background var(--fast),color var(--fast);
  width:100%;text-align:left;
}
.nav-item svg{flex:none;width:17px;height:17px;stroke-width:1.8}
.nav-item:hover{background:var(--s2);color:var(--t1)}
.nav-item.active{background:var(--red-dim);color:var(--red)}
.nav-item.active svg{stroke:var(--red)}

.sb-footer{
  margin-top:auto;padding-top:14px;
  display:flex;flex-direction:column;gap:6px;
  border-top:1px solid var(--border);
}
.sb-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;border-radius:var(--radius-sm);
  background:var(--s2);border:1px solid var(--border);
  font-size:12px;font-weight:500;color:var(--t1);
  transition:border-color var(--fast);
}
.sb-toggle:hover{border-color:var(--red)}
.pill-badge{
  background:var(--red);color:#fff;
  font-size:9px;font-weight:700;
  padding:2px 8px;border-radius:20px;letter-spacing:.3px;
}
.switch{
  width:36px;height:20px;border-radius:10px;
  background:var(--s5);position:relative;
  transition:background var(--fast);flex:none;pointer-events:none;
}
.switch.on{background:var(--red)}
.switch::after{
  content:'';position:absolute;
  width:14px;height:14px;border-radius:50%;
  background:#fff;top:3px;left:3px;
  transition:left var(--fast);
}
.switch.on::after{left:19px}

/* ═══════════════ MOBILE HEADER ═══════════════ */
.mhdr{
  position:fixed;top:0;left:0;right:0;z-index:40;
  height:56px;display:flex;align-items:center;
  justify-content:space-between;
  padding:0 14px;
  padding-top:env(safe-area-inset-top,0px);
  background:linear-gradient(180deg,var(--glass2) 55%,transparent);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
@media(min-width:768px){.mhdr{display:none}}
.m-logo{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:3px;cursor:pointer;
  display:flex;align-items:center;gap:5px;
}
.m-logo em{color:var(--red);font-style:normal}
.m-logo-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--red);margin-top:-10px;
}
.macts{display:flex;gap:6px}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--s2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--t1);transition:all var(--fast);
  touch-action:manipulation;
}
.icon-btn:hover{border-color:var(--red);color:var(--red)}
.icon-btn svg{width:16px;height:16px;stroke-width:1.8}
.icon-btn:active{transform:scale(.92);background:var(--s3)}

/* ═══════════════ BOTTOM NAV ═══════════════ */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:var(--glass);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
@media(min-width:768px){.bnav{display:none}}
.bnav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;padding:10px 0;
  color:var(--t3);
  transition:color var(--fast);
  position:relative;touch-action:manipulation;
}
.bnav-item svg{width:20px;height:20px;stroke-width:1.8}
.bnav-item span{font-size:9px;font-weight:600;letter-spacing:.2px}
.bnav-item.active{color:var(--red)}
.bnav-item.active::before{
  content:'';position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  width:28px;height:2.5px;
  background:var(--red);border-radius:0 0 3px 3px;
}
.bnav-item:active{opacity:.7}

/* ═══════════════ LAYOUT ═══════════════ */
#app{
  min-height:100dvh;
  padding-bottom:calc(62px + env(safe-area-inset-bottom,0px));
}
@media(min-width:768px){#app{margin-left:var(--sidebar);padding-bottom:0}}
.page{display:none;min-height:100dvh;touch-action:pan-y}
.page.active{display:block}

/* ═══════════════ HERO ═══════════════ */
.hero{
  position:relative;width:100%;
  height:72vh;min-height:400px;max-height:660px;
  overflow:hidden;background:var(--s1);
}
@media(min-width:768px){.hero{height:84vh;max-height:740px}}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .9s var(--ease);z-index:0;pointer-events:none}
.slide.on{opacity:1;z-index:1;pointer-events:auto}
.slide-img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
.slide-fog{
  position:absolute;inset:0;
  background:linear-gradient(0deg,var(--bg) 0%,rgba(8,8,15,.62) 38%,rgba(8,8,15,.08) 70%,rgba(8,8,15,.28) 100%);
}
html[data-theme=light] .slide-fog{
  background:linear-gradient(0deg,var(--bg) 0%,rgba(240,240,248,.68) 40%,rgba(240,240,248,.06) 70%);
}
.slide-body{
  position:absolute;bottom:0;left:0;right:0;
  padding:24px 18px 60px;z-index:2;
}
@media(min-width:768px){.slide-body{padding:40px 40px 50px;max-width:660px}}
.slide-type{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;padding:3px 10px;border-radius:4px;
  margin-bottom:10px;
}
.slide-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(32px,8.5vw,72px);
  line-height:1.02;letter-spacing:2px;
  margin-bottom:10px;
  text-shadow:0 2px 20px rgba(0,0,0,.5);
}
body.ar .slide-title{font-size:clamp(26px,6vw,56px);line-height:1.35}
.slide-pills{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.pill{
  display:flex;align-items:center;gap:4px;
  font-size:12px;font-weight:600;
  color:rgba(255,255,255,.82);
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(8px);
  padding:4px 10px;border-radius:20px;
  border:1px solid rgba(255,255,255,.12);
}
.pill.gold{color:var(--gold);border-color:rgba(245,197,24,.28);background:rgba(245,197,24,.1)}
.slide-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-watch{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--red);color:#fff;
  font-size:13px;font-weight:700;
  padding:11px 24px;border-radius:50px;
  transition:all var(--fast);
  box-shadow:0 6px 24px var(--red-glow);
  text-transform:uppercase;letter-spacing:.6px;
  touch-action:manipulation;
}
.btn-watch:hover{transform:translateY(-1px);box-shadow:0 10px 32px var(--red-glow)}
.btn-watch:active{transform:scale(.96)}
.btn-info{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);color:#fff;
  font-size:13px;font-weight:700;
  padding:11px 20px;border-radius:50px;
  border:1px solid rgba(255,255,255,.22);
  transition:all var(--fast);
  text-transform:uppercase;letter-spacing:.6px;
  backdrop-filter:blur(6px);touch-action:manipulation;
}
.btn-info:hover{background:rgba(255,255,255,.22)}
.btn-info:active{transform:scale(.96)}
.hero-nav{
  position:absolute;top:50%;transform:translateY(-50%);z-index:5;
  width:38px;height:38px;border-radius:50%;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.15);
  color:#fff;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all var(--fast);
  backdrop-filter:blur(8px);touch-action:manipulation;
}
.hero:hover .hero-nav{opacity:1}
.hero-nav:hover{background:var(--red);border-color:var(--red)}
.hero-nav:active{transform:translateY(-50%) scale(.9)}
.hero-nav.prev{left:14px}
.hero-nav.next{right:14px}
.hero-nav svg{width:16px;height:16px;stroke-width:2.2}
.hero-dots{
  position:absolute;bottom:22px;left:50%;
  transform:translateX(-50%);z-index:5;
  display:flex;gap:5px;
}
.dot-btn{
  width:5px;height:5px;border-radius:3px;
  background:rgba(255,255,255,.28);
  transition:all var(--mid);
}
.dot-btn.on{width:20px;background:var(--red)}

/* ═══════════════ SECTIONS ═══════════════ */
.content{padding:4px 0 0;position:relative;z-index:2}
.section{padding:18px 0 4px}
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;margin-bottom:12px;
}
@media(min-width:768px){.section-head{padding:0 28px}}
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:1.2px;
  display:flex;align-items:center;gap:9px;
}
body.ar .section-title{font-size:17px;letter-spacing:0}
.section-title::before{
  content:'';display:inline-block;
  width:3px;height:18px;
  background:linear-gradient(180deg,#ff5555,var(--red));
  border-radius:2px;flex:none;
  box-shadow:0 0 8px var(--red-glow);
}
.see-all{
  font-size:10px;font-weight:700;color:var(--red);
  text-transform:uppercase;letter-spacing:1px;
  padding:4px 2px;touch-action:manipulation;
}
.hs{
  display:flex;gap:10px;overflow-x:auto;
  padding:2px 18px 14px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.hs::-webkit-scrollbar{display:none}
@media(min-width:768px){.hs{padding:2px 28px 14px;gap:13px}}

/* ═══════════════ CATEGORY CHIPS ═══════════════ */
.cat-chip{
  flex:none;cursor:pointer;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--radius);
  padding:13px 17px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  min-width:88px;transition:all var(--fast);
  touch-action:manipulation;
}
.cat-chip:hover{border-color:var(--red);transform:translateY(-2px)}
.cat-chip:active{transform:scale(.94)}
.cat-emoji{font-size:26px}
.cat-label{font-size:10px;font-weight:600;color:var(--t2);text-align:center}

/* ═══════════════ CARDS ═══════════════ */
.card{
  flex:none;cursor:pointer;position:relative;
  border-radius:var(--radius);overflow:hidden;
  transition:transform var(--fast),box-shadow var(--fast);
  touch-action:manipulation;
}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.5)}
.card:active{transform:scale(.95)}
.card-img{
  aspect-ratio:2/3;background:var(--s2);
  position:relative;overflow:hidden;
}
.card-img img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .4s var(--ease);display:block;
}
.card:hover .card-img img{transform:scale(1.06)}
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(8,8,15,.96) 0%,rgba(8,8,15,.18) 65%,transparent 100%);
  opacity:0;transition:opacity var(--fast);
  display:flex;align-items:flex-end;padding:10px;
}
.card:hover .card-overlay{opacity:1}
.card-play{
  width:32px;height:32px;border-radius:50%;
  background:var(--red);display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px var(--red-glow);
}
.card-play svg{width:12px;height:12px;margin-left:2px}
.card-badge{
  position:absolute;top:7px;left:7px;
  background:var(--red);color:#fff;
  font-size:7px;font-weight:700;
  padding:2px 6px;border-radius:3px;
  text-transform:uppercase;letter-spacing:.5px;
}
.card-score{
  position:absolute;top:7px;right:7px;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
  color:var(--gold);font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:3px;
}
.card-prog{position:absolute;bottom:0;left:0;height:2px;background:var(--red)}
.card-body{padding:7px 2px 3px}
.card-title{
  font-size:11.5px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--t1);letter-spacing:-.01em;
}
.card-year{font-size:10px;color:var(--t2);margin-top:2px}
.csm{width:126px}
@media(min-width:768px){.csm{width:148px}}
.cgc{width:100%}

/* ═══════════════ BROWSE PAGE ═══════════════ */
.page-top{padding:70px 18px 14px}
@media(min-width:768px){.page-top{padding:34px 28px 14px}}
.page-heading{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;letter-spacing:2px;
}
body.ar .page-heading{font-size:26px;letter-spacing:0}
.genre-bar{
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:2px;margin-top:12px;scrollbar-width:none;
}
.genre-bar::-webkit-scrollbar{display:none}
.genre-btn{
  flex:none;padding:6px 14px;border-radius:20px;
  font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--s2);
  color:var(--t2);transition:all var(--fast);
  white-space:nowrap;touch-action:manipulation;
}
.genre-btn:hover,.genre-btn.on{background:var(--red);border-color:var(--red);color:#fff}
.sort-strip{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px 12px;flex-wrap:wrap;
}
@media(min-width:768px){.sort-strip{padding:8px 28px 12px}}
.sort-label{font-size:11px;color:var(--t2);font-weight:600}
.sort-select{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--t1);
  font-size:11px;padding:5px 10px;outline:none;
}
.content-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:10px;padding:0 18px;
}
@media(min-width:480px){.content-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.content-grid{grid-template-columns:repeat(4,1fr);padding:0 28px;gap:12px}}
@media(min-width:1024px){.content-grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:1280px){.content-grid{grid-template-columns:repeat(6,1fr)}}
.load-more-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:calc(100% - 36px);margin:16px 18px;padding:13px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--t1);
  font-size:13px;font-weight:600;
  transition:all var(--fast);touch-action:manipulation;
}
.load-more-btn:hover{border-color:var(--red);color:var(--red)}
.load-more-btn:active{transform:scale(.98)}

/* ═══════════════ WATCHLIST ═══════════════ */
.wl-top{padding:70px 18px 14px}
@media(min-width:768px){.wl-top{padding:34px 28px 14px}}
.wl-stats{display:flex;gap:10px;margin-top:10px}
.stat-box{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--radius);padding:9px 14px;
}
.stat-num{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  color:var(--red);line-height:1;
}
.stat-lbl{font-size:10px;color:var(--t2);margin-top:2px}
.wl-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:10px;padding:0 18px;
}
@media(min-width:480px){.wl-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.wl-grid{grid-template-columns:repeat(4,1fr);padding:0 28px}}
.wl-empty{
  text-align:center;padding:64px 20px;color:var(--t2);
}
.wl-empty svg{width:52px;height:52px;margin:0 auto 14px;opacity:.2}
.wl-empty h3{font-size:18px;font-weight:700;margin-bottom:7px;color:var(--t1)}
.wl-empty p{font-size:13px;line-height:1.65}

/* ═══════════════ PERSON ═══════════════ */
.person-hero{
  padding:72px 18px 20px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
@media(min-width:768px){.person-hero{padding:38px 28px 20px;flex-direction:row;align-items:flex-start}}
.person-av{
  width:112px;height:112px;border-radius:50%;object-fit:cover;
  border:2px solid var(--red);background:var(--s2);flex:none;
}
.person-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;letter-spacing:1px;
}
body.ar .person-name{font-size:24px;letter-spacing:0}
.person-tags{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 10px}
.person-tag{
  background:var(--s2);border:1px solid var(--border);
  border-radius:7px;padding:3px 9px;font-size:10px;color:var(--t2);
}
.person-bio{
  font-size:13px;color:var(--t2);line-height:1.8;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
}

/* ═══════════════ PLAYER ═══════════════ */
#pm{
  position:fixed;inset:0;background:var(--bg);z-index:70;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform var(--slow) var(--ease);
  overflow:hidden;
}
#pm.open{transform:translateY(0)}
#pm.gone{display:none}

.player-bar{
  position:absolute;top:0;left:0;right:0;z-index:5;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  background:linear-gradient(180deg,var(--glass2) 0%,transparent 100%);
}
html[data-theme=light] .player-bar{background:linear-gradient(180deg,rgba(240,240,248,.97) 0%,transparent 100%)}
.player-bar-title{
  font-size:14px;font-weight:700;
  flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin:0 10px;
}
.player-bar-actions{display:flex;gap:6px;flex:none}

/* Video */
.vwrap{width:100%;background:#000;position:relative;flex:none}
.vwrap::after{content:'';display:block;padding-bottom:56.25%}
#vf{position:absolute;inset:0;width:100%;height:100%;border:none}
#ld{
  position:absolute;inset:0;z-index:3;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;
  background:var(--bg);
}
#ldp{font-size:12px;color:var(--t2)}

/* Fullscreen */
#fs-btn{
  position:absolute;bottom:10px;right:10px;z-index:10;
  width:34px;height:34px;border-radius:var(--radius-sm);
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.18);
  color:#fff;display:flex;align-items:center;justify-content:center;
  transition:all var(--fast);opacity:.8;touch-action:manipulation;
}
#fs-btn:hover{opacity:1;border-color:var(--red)}
#fs-btn:active{transform:scale(.9)}
#fs-btn svg{width:16px;height:16px;stroke-width:2}
.vwrap.fs-on{position:fixed!important;inset:0!important;z-index:200!important;padding-bottom:0!important}
.vwrap.fs-on::after{display:none}
.vwrap.fs-on #vf{position:absolute;inset:0;width:100%;height:100%}
.vwrap.fs-on #fs-btn{position:fixed;bottom:16px;right:16px;z-index:201;width:40px;height:40px;opacity:1}

/* Player body */
.player-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;scrollbar-width:none;
}
.player-body::-webkit-scrollbar{display:none}
.player-meta{padding:18px 18px 40px}
@media(min-width:768px){.player-meta{padding:22px 28px 40px}}

.player-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:1.2px;
  margin-bottom:10px;line-height:1.1;
}
body.ar .player-title{font-size:22px;letter-spacing:0}

.info-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.info-pill{
  background:var(--s2);border:1px solid var(--border);
  border-radius:6px;padding:3px 9px;
  font-size:11px;font-weight:600;color:var(--t2);
}
.info-pill.gold{color:var(--gold);border-color:rgba(245,197,24,.25);background:rgba(245,197,24,.07)}

.player-desc{
  font-size:14px;color:var(--t2);line-height:1.8;
  margin-bottom:18px;
}

.player-actions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.p-btn-white{
  flex:1;min-width:110px;
  display:flex;align-items:center;justify-content:center;gap:7px;
  background:rgba(255,255,255,.95);color:#000;
  font-size:12px;font-weight:700;
  padding:11px 16px;border-radius:10px;
  transition:all var(--fast);
  text-transform:uppercase;letter-spacing:.5px;
  touch-action:manipulation;
}
.p-btn-white:hover{background:#fff}
.p-btn-white:active{transform:scale(.96)}
html[data-theme=light] .p-btn-white{background:var(--red);color:#fff}
.p-btn-dark{
  flex:1;min-width:110px;
  display:flex;align-items:center;justify-content:center;gap:7px;
  background:var(--s2);color:var(--t1);
  font-size:12px;font-weight:700;
  padding:11px 16px;border-radius:10px;
  border:1px solid var(--border);
  transition:all var(--fast);
  text-transform:uppercase;letter-spacing:.5px;
  touch-action:manipulation;
}
.p-btn-dark:hover{border-color:var(--red);color:var(--red)}
.p-btn-dark:active{transform:scale(.96)}

/* Source bar */
.source-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:10px;
  background:var(--s2);border:1px solid var(--border);
  font-size:11px;color:var(--t2);
  margin-bottom:12px;
}
.sdot{
  width:7px;height:7px;border-radius:50%;
  background:var(--t3);flex:none;
  transition:background var(--fast);
}
.sdot.ok{background:#22c55e}
.sdot.try{background:var(--gold);animation:blink .9s infinite}
.sdot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* Source progress */
#src-prog{display:none;margin-bottom:12px}
#src-prog.on{display:block}
.src-track{
  display:flex;gap:3px;
  height:3px;border-radius:2px;overflow:hidden;
}
.src-seg{
  flex:1;height:100%;background:var(--s4);
  transition:background var(--fast);border-radius:2px;
}
.src-seg.done{background:#22c55e}
.src-seg.live{background:var(--gold);animation:blink .9s infinite}
.src-seg.fail{background:var(--red);opacity:.45}

/* Manual servers */
#srv-manual{display:none;flex-wrap:wrap;gap:6px;margin-bottom:12px}
#srv-manual.on{display:flex}
.srv-btn{
  padding:6px 12px;border-radius:7px;
  background:var(--s2);border:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--t2);
  transition:all var(--fast);touch-action:manipulation;
}
.srv-btn:hover{border-color:var(--red);color:var(--red)}
.srv-btn.active{background:var(--red);border-color:var(--red);color:#fff}

/* TV controls */
.tv-ctrl{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--radius);padding:13px;
  margin-bottom:14px;display:none;
}
.tv-ctrl.on{display:block}
.tv-selects{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.tv-select{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--t1);
  font-size:12px;padding:8px 10px;outline:none;
}
.tv-nav{display:flex;gap:7px}
.tv-btn{
  flex:1;padding:9px;border-radius:var(--radius-sm);
  background:var(--s3);color:var(--t1);
  font-size:11px;font-weight:600;
  transition:all var(--fast);touch-action:manipulation;
}
.tv-btn:hover{background:var(--red);color:#fff}
.tv-btn:disabled{opacity:.3;pointer-events:none}

/* Meta labels */
.meta-lbl{
  font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--t3);margin-bottom:10px;
}
body.ar .meta-lbl{letter-spacing:0;font-size:10px}
.meta-divider{
  border-top:1px solid var(--border);
  margin:20px 0 16px;
}

/* Cast */
.cast-row{
  display:flex;gap:12px;overflow-x:auto;
  padding-bottom:4px;margin-bottom:20px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{
  flex:none;width:62px;text-align:center;
  cursor:pointer;touch-action:manipulation;
}
.cast-av{
  width:52px;height:52px;border-radius:50%;
  object-fit:cover;background:var(--s2);
  margin:0 auto 5px;border:2px solid var(--border);
  transition:border-color var(--fast),transform var(--fast);display:block;
}
.cast-card:hover .cast-av{border-color:var(--red);transform:scale(1.07)}
.cast-name{font-size:8.5px;font-weight:600;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cast-role{font-size:7.5px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}

/* Similar */
.sim-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:9px;margin-bottom:10px;
}
@media(min-width:480px){.sim-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:768px){.sim-grid{grid-template-columns:repeat(5,1fr)}}

/* ═══════════════ SEARCH PAGE ═══════════════ */
#pg-search{
  position:fixed;inset:0;z-index:60;
  background:var(--bg);
  display:none;flex-direction:column;
  transform:translateX(100%);
  transition:transform var(--mid) var(--ease);
  will-change:transform;
}
#pg-search.open{display:flex!important;transform:translateX(0)}

.search-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  padding-top:calc(10px + env(safe-area-inset-top,0px));
  background:var(--s1);border-bottom:1px solid var(--border);
  flex:none;
}
.si-wrap{flex:1;position:relative}
.si-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--t2);pointer-events:none;
}
#si{
  width:100%;background:var(--s2);
  border:1.5px solid transparent;border-radius:12px;
  padding:11px 14px 11px 42px;
  font-size:15px;color:var(--t1);font-family:inherit;outline:none;
  transition:border-color var(--fast),background var(--fast);
  -webkit-appearance:none;
}
#si:focus{border-color:var(--red);background:var(--s1)}
#si::placeholder{color:var(--t2);font-size:14px}
.search-cancel{
  color:var(--red);font-size:14px;font-weight:600;
  white-space:nowrap;padding:6px 0;flex:none;
  touch-action:manipulation;
}

/* Filter chip bar */
.chip-bar{
  background:var(--s1);border-bottom:1px solid var(--border);
  height:46px;display:flex;align-items:center;
  gap:7px;padding:0 14px;
  flex:none;overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.chip-bar::-webkit-scrollbar{display:none}
.chip{
  flex:none;display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--s2);
  font-size:11px;font-weight:600;color:var(--t2);
  white-space:nowrap;transition:all var(--fast);
  touch-action:manipulation;
}
.chip select{
  background:none;border:none;color:inherit;
  font-size:11px;font-weight:600;font-family:inherit;
  outline:none;cursor:pointer;padding:0;
  -webkit-appearance:none;appearance:none;max-width:74px;
}
.chip svg{width:12px;height:12px;flex:none;stroke-width:2}
.chip.on,.chip:active{
  border-color:var(--red);background:var(--red-dim);color:var(--red);
}
.chip.on select{color:var(--red)}
.chip-clear{
  flex:none;padding:5px 10px;border-radius:20px;
  font-size:11px;font-weight:700;color:var(--red);
  touch-action:manipulation;white-space:nowrap;
}

/* Result count */
#sr-count{
  flex:none;padding:9px 16px 3px;
  font-size:11px;font-weight:600;color:var(--t2);
  letter-spacing:.02em;display:none;
}

/* Results list */
#sr{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:4px 8px 80px;
  display:flex;flex-direction:column;
  scrollbar-width:none;
}
#sr::-webkit-scrollbar{display:none}

.sr-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 20px;
  color:var(--t2);text-align:center;gap:10px;flex:1;
}
.sr-empty svg{width:40px;height:40px;opacity:.2}
.sr-empty p{font-size:14px;line-height:1.6}

.sr-group-label{
  padding:12px 8px 6px;
  font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--t3);
}

/* Result row */
.sr-row{
  display:flex;align-items:center;gap:12px;
  padding:9px 8px;border-radius:11px;
  cursor:pointer;user-select:none;
  transition:background var(--fast);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.sr-row:active{background:var(--s2);transform:scale(.985)}
@media(hover:hover){.sr-row:hover{background:var(--s2)}}
.sr-poster{
  width:46px;height:69px;border-radius:8px;
  object-fit:cover;background:var(--s2);flex:none;display:block;
}
.sr-info{flex:1;min-width:0}
.sr-name{
  font-size:14px;font-weight:600;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}
.sr-metas{
  display:flex;align-items:center;gap:5px;
  margin-top:4px;overflow:hidden;
}
.sr-tag{
  font-size:9.5px;font-weight:700;padding:2px 6px;
  border-radius:4px;white-space:nowrap;flex:none;
  background:var(--s3);color:var(--t2);
  text-transform:uppercase;letter-spacing:.3px;
}
.sr-tag.tv{background:var(--red-dim);color:var(--red)}
.sr-tag.movie{background:rgba(99,102,241,.12);color:#a5b4fc}
.sr-score{
  display:flex;align-items:center;gap:2px;
  font-size:10px;font-weight:700;color:var(--gold);
  flex:none;white-space:nowrap;
}
.sr-year{font-size:10px;color:var(--t2);flex:none}
.sr-play{
  width:34px;height:34px;border-radius:50%;
  background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  color:var(--t2);flex:none;transition:all var(--fast);flex:none;
}
.sr-row:active .sr-play,
@media(hover:hover){.sr-row:hover .sr-play}{background:var(--red);color:#fff}
.sr-play svg{width:12px;height:12px;margin-left:2px}

/* Person row */
.sr-person{
  display:flex;align-items:center;gap:12px;
  padding:9px 8px;border-radius:11px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transition:background var(--fast);
}
.sr-person:active{background:var(--s2)}
@media(hover:hover){.sr-person:hover{background:var(--s2)}}
.sr-av{
  width:46px;height:46px;border-radius:50%;
  object-fit:cover;background:var(--s2);
  flex:none;border:1.5px solid var(--border);
}
.sr-pname{font-size:14px;font-weight:600;color:var(--t1)}
.sr-pdept{font-size:11px;color:var(--t2);margin-top:2px}

/* ═══════════════ SPINNERS & SKELETONS ═══════════════ */
.spinner{
  width:28px;height:28px;
  border:2.5px solid var(--s4);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-wrap{min-height:360px;display:flex;align-items:center;justify-content:center}
.skel{
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:var(--radius);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ═══════════════ TOAST ═══════════════ */
#toast{
  position:fixed;bottom:74px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(28,28,44,.94);
  border:1px solid rgba(255,255,255,.1);
  color:var(--t1);padding:10px 20px;
  border-radius:28px;font-size:12px;font-weight:600;
  z-index:999;opacity:0;
  transition:all var(--mid);
  white-space:nowrap;pointer-events:none;
  backdrop-filter:blur(16px);
  max-width:88vw;overflow:hidden;text-overflow:ellipsis;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:26px}}

/* ═══════════════ ANIMATIONS ═══════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp var(--mid) var(--ease) forwards}
</style>
</head>
<body>

  <div class="sb-logo" onclick="showPage('home')">
    <div class="sb-logo-text"><em>Mz</em>Cinema</div>
    <div class="sb-logo-dot"></div>
  </div>
  <span class="sb-section" id="sb-browse">Browse</span>
  <button class="nav-item active" data-v="home" onclick="showPage('home')">

  <button class="nav-item" data-v="tv" onclick="showPage('tv')">

    <span id="sb-search">Search</span>
  </button>
  <div class="sb-footer">
    <button class="sb-toggle" onclick="toggleTheme()">
      <span id="theme-lbl">🌙 Dark Mode</span>

    </button>
    <button class="sb-toggle" onclick="toggleLang()">
      <span id="lang-lbl">🌐 English</span>
      <span class="pill-badge" id="sb-switch">Switch</span>
    </button>
  </div>
</aside>

<header class="mhdr">
  <div class="m-logo" onclick="showPage('home')">
    <em>Mz</em>Cinema<span class="m-logo-dot"></span>
  </div>
  <div class="macts">
    <button class="icon-btn" onclick="toggleTheme()" id="mtheme-btn">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
    </button>
    <button class="icon-btn" onclick="toggleLang()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
    </button>
    <button class="icon-btn" onclick="showPage('watchlist')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
    </button>
    <button class="icon-btn" onclick="openSearch()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </button>
  </div>

// ═══════════════ API ═══════════════
async function api(ep){
  const sep=ep.includes('?')?'&':'?';
  const r=await fetch(`https://api.themoviedb.org/3/${ep}${sep}api_key=${AK}&language=${S.lang}-${S.lang==='ar'?'SA':'US'}`);
  return r.json();
}
async function apiDet(id,type){
  const r=await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${AK}&language=${S.lang}-${S.lang==='ar'?'SA':'US'}&append_to_response=similar,credits,videos,recommendations`);
  return r.json();
}

// ═══════════════ ROUTER ═══════════════
function showPage(name,param){
  S.curPage=name;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=$('pg-'+name);
  if(pg){pg.classList.add('active');window.scrollTo(0,0);}
  document.querySelectorAll('.nav-item,.bnav-item').forEach(el=>el.classList.toggle('active',el.dataset.v===name));
  if(name==='home')loadHome();
  else if(name==='movies'){S.curBrowsePage=1;S.curGenre='';loadBrowsePage(L('allMovies'),'movie',GM);}
  else if(name==='tv'){S.curBrowsePage=1;S.curGenre='';loadBrowsePage(L('allSeries'),'tv',GT);}
  else if(name==='watchlist')renderWatchlist();
  else if(name==='person')loadPerson(param);
  else if(name==='cat')loadCat(param);
}

let slT=null,slI=0,slArr=[];
function slInit(items){
  slArr=items;slI=0;slAuto();
  return `<div class="hero" id="hero" onmouseenter="slStop()" onmouseleave="slAuto()">
    ${items.map((it,i)=>`<div class="slide${i===0?' on':''}" id="sl${i}">
      <img class="slide-img" src="${ORIG}${it.backdrop_path||it.poster_path}" alt="" loading="${i===0?'eager':'lazy'}">
      <div class="slide-fog"></div>
      <div class="slide-body">
        <div class="slide-type">${it.media_type==='tv'?L('series'):L('movies')}</div>
        <h1 class="slide-title">${it.title||it.name}</h1>
        <div class="slide-pills">
          <span class="pill gold">\u2605 ${(it.vote_average||0).toFixed(1)}</span>
          <span class="pill">${(it.release_date||it.first_air_date||'').split('-')[0]}</span>
          ${it.original_language?`<span class="pill">${it.original_language.toUpperCase()}</span>`:''}
        </div>
        <div class="slide-actions">
          <button class="btn-watch" onclick="openPlayer(${it.id},'${it.media_type}')">
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
            ${S.lang==='ar'?'\u0634\u0627\u0647\u062f':'Watch'}
          </button>
          <button class="btn-info" onclick="openPlayer(${it.id},'${it.media_type}')">
            ${S.lang==='ar'?'\u062a\u0641\u0627\u0635\u064a\u0644':'Info'}
          </button>
        </div>
      </div>
    </div>`).join('')}
    <button class="hero-nav prev" onclick="slPrev()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
    <button class="hero-nav next" onclick="slNext()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
    <div class="hero-dots">${items.map((_,i)=>`<button class="dot-btn${i===0?' on':''}" onclick="slGo(${i})"></button>`).join('')}</div>
  </div>`;
}
function slUpd(){
  document.querySelectorAll('.slide').forEach((e,i)=>e.classList.toggle('on',i===slI));
  document.querySelectorAll('.dot-btn').forEach((e,i)=>e.classList.toggle('on',i===slI));
}
function slNext(){slI=(slI+1)%slArr.length;slUpd();}
function slPrev(){slI=(slI-1+slArr.length)%slArr.length;slUpd();}
function slGo(i){slI=i;slUpd();}
function slAuto(){slStop();slT=setInterval(slNext,6000);}
function slStop(){if(slT){clearInterval(slT);slT=null;}}

// ═══════════════ CARD ═══════════════
function card(it,cls='csm',isH=false){
  const type=it.media_type||(it.title?'movie':'tv');
  const yr=(it.release_date||it.first_air_date||'').split('-')[0];
  const safe=(it.title||it.name||'').replace(/"/g,'"');
  return `<div class="card ${cls}" onclick="openPlayer(${it.id},'${type}')" tabindex="0" role="button" aria-label="${safe}">
    <div class="card-img">
      <img src="${it.poster_path?IMG+it.poster_path:'https://placehold.co/300x450/141428/555?text=?'}" alt="${safe}" loading="lazy" decoding="async">
      <div class="card-overlay"><div class="card-play"><svg width="12" height="12" fill="white" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg></div></div>
      ${type==='tv'?`<div class="card-badge">${L('series')}</div>`:''}
      ${it.vote_average?`<div class="card-score">\u2605 ${it.vote_average.toFixed(1)}</div>`:''}
      ${isH?`<div class="card-prog" style="width:${30+it.id%48}%"></div>`:''}
    </div>
    <div class="card-body">
      <div class="card-title">${it.title||it.name||''}</div>
      ${yr?`<div class="card-year">${yr}</div>`:''}
    </div>
  </div>`;
}

async function filterBrowse(type,gid,btn){

async function loadBrowse(type,gid,sort,page,replace){
  const g=$(`bg-${type}`);if(!g)return;

  const html=data.results.filter(i=>i.poster_path).map(i=>card(i,'cgc')).join('');

// ═══════════════ PLAYER ═══════════════
async function openPlayer(id,type){
  slStop();
  const m=$('pm');m.classList.remove('gone');
  const vf=$('vf');vf.onload=null;vf.onerror=null;vf.src='about:blank';
  const ld=$('ld');if(ld)ld.style.display='flex';
  setT('ldp',L('srcTry'));setStatus('try',L('srcTry'));
  const sm=$('srv-manual');if(sm){sm.innerHTML='';sm.classList.remove('on');}
  const sp=$('src-prog');if(sp){sp.classList.remove('on');sp.querySelector('#src-track').innerHTML='';}
  m.classList.add('open');
  // Start video immediately in parallel with metadata
  S.cur={id,media_type:type};S.srvIdx=0;
  tryServer();
  const data=await apiDet(id,type);
  const wasPlaying=S.srvIdx>0;
  S.cur={...data,media_type:type};
  if(!wasPlaying){S.srvIdx=0;tryServer();}
  setT('ptxt',data.title||data.name);
  setT('pmttl',data.title||data.name);
  setT('pov',data.overview||'');
  const yr=(data.release_date||data.first_air_date||'').split('-')[0];
  const rt=data.runtime?`${data.runtime}m`:(data.episode_run_time?.[0]?`${data.episode_run_time[0]}m`:'');
  setH('ppills',`${yr?`<span class="info-pill">${yr}</span>`:''}
    ${data.vote_average?`<span class="info-pill gold">\u2605 ${data.vote_average.toFixed(1)}</span>`:''}
    ${rt?`<span class="info-pill">${rt}</span>`:''}
    ${data.genres?.slice(0,3).map(g=>`<span class="info-pill">${g.name}</span>`).join('')||''}`);
  refreshWlBtn(id,data);
  setH('castl',data.credits?.cast?.slice(0,18).map(c=>`
    <div class="cast-card" onclick="showPage('person',${c.id});closePlayer()">
      <img class="cast-av" src="${c.profile_path?IMG+c.profile_path:'https://placehold.co/52x52/141428/555?text=?'}" alt="${c.name}" loading="lazy">
      <div class="cast-name">${c.name}</div>
      <div class="cast-role">${c.character||''}</div>
    </div>`).join('')||'');
  if(!data.adult){
    S.hist=S.hist.filter(i=>i.id!==id);S.hist.unshift(data);
    if(S.hist.length>30)S.hist.pop();
    localStorage.setItem('mzh',JSON.stringify(S.hist));
  }
  const sim=(data.similar?.results||data.recommendations?.results||[]).filter(i=>i.poster_path).slice(0,8);
  setH('siml',sim.map(i=>card(i,'cgc')).join(''));
  const tc=$('tvctrl');
  if(type==='tv'){
    tc.classList.add('on');
    const ss=$('ssel');
    ss.innerHTML=data.seasons?.filter(s=>s.season_number>0).map(s=>`<option value="${s.season_number}">Season ${s.season_number}</option>`).join('')||'';
    ss.onchange=async()=>{
      const sd=await api(`tv/${id}/season/${ss.value}?`);
      const es=$('esel');
      es.innerHTML=sd.episodes?.map(e=>`<option value="${e.episode_number}">Ep ${e.episode_number}: ${e.name}</option>`).join('')||'';
      es.onchange=()=>{S.srvIdx=0;tryServer();};
      setupEpNav();S.srvIdx=0;tryServer();
    };
    ss.dispatchEvent(new Event('change'));
  } else {
    tc.classList.remove('on');
  }
  const pb=document.querySelector('.player-body');if(pb)pb.scrollTop=0;
}

function buildUrl(idx){
  const d=S.cur;
  const s=getV('ssel','1'),e=getV('esel','1');
  const srv=SRVS[idx];if(!srv)return null;
  return d.media_type==='movie'
    ?srv.m.replace('{id}',d.id)
    :srv.tv.replace('{id}',d.id).replace('{s}',s).replace('{e}',e);
}
function updateSrcProg(){
  const sp=$('src-prog');const track=$('src-track');if(!sp||!track)return;
  sp.classList.add('on');
  track.innerHTML=SRVS.map((_,i)=>{
    let cls='src-seg';
    if(i<S.srvIdx)cls+=' done';
    else if(i===S.srvIdx)cls+=' live';
    return `<div class="${cls}" title="${SRVS[i].n}"></div>`;
  }).join('');
}
function tryServer(){
  clearTimeout(S.srvTimer);updateSrcProg();
  if(S.srvIdx>=SRVS.length){
    setStatus('err',L('srcErr'));
    const ld=$('ld');if(ld)ld.style.display='none';
    const sm=$('srv-manual');
    if(sm){
      sm.innerHTML=`<span style="font-size:11px;color:var(--t2);width:100%">${L('manualSrc')}</span>`
        +SRVS.map((s,i)=>`<button class="srv-btn" onclick="manualSrv(${i})">${s.n}</button>`).join('');
      sm.classList.add('on');
    }
    document.querySelectorAll('.src-seg:not(.done)').forEach(d=>d.classList.add('fail'));
    return;
  }
  const url=buildUrl(S.srvIdx);if(!url){S.srvIdx++;tryServer();return;}
  setStatus('try',`${L('srcTry')} — ${SRVS[S.srvIdx].n}`);
  const ld=$('ld');if(ld)ld.style.display='flex';
  setT('ldp',`${SRVS[S.srvIdx].n}…`);
  const f=$('vf');
  f.onload=null;f.onerror=null;f.src=url;
  S.srvTimer=setTimeout(()=>{f.onload=null;f.onerror=null;S.srvIdx++;setStatus('try',L('srcFail'));tryServer();},9000);
  f.onload=()=>{
    clearTimeout(S.srvTimer);
    if(ld)ld.style.display='none';
    setStatus('ok',`${L('srcOk')} — ${SRVS[S.srvIdx].n}`);
    const segs=document.querySelectorAll('.src-seg');
    if(segs[S.srvIdx]){segs[S.srvIdx].classList.remove('live');segs[S.srvIdx].classList.add('done');}
  };
  f.onerror=()=>{
    clearTimeout(S.srvTimer);f.onload=null;f.onerror=null;
    const segs=document.querySelectorAll('.src-seg');
    if(segs[S.srvIdx])segs[S.srvIdx].classList.add('fail');
    S.srvIdx++;tryServer();
  };
}
function manualSrv(idx){
  S.srvIdx=idx;$('srv-manual')?.classList.remove('on');clearTimeout(S.srvTimer);
  const url=buildUrl(idx);if(!url)return;
  const ld=$('ld');if(ld)ld.style.display='flex';
  setT('ldp',`${SRVS[idx].n}…`);setStatus('try',SRVS[idx].n);updateSrcProg();
  const f=$('vf');f.src=url;
  f.onload=()=>{if(ld)ld.style.display='none';setStatus('ok',`${L('srcOk')} — ${SRVS[idx].n}`);};
}
function setupEpNav(){
  const es=$('esel');
  $('prevep').onclick=()=>{if(es.selectedIndex>0){es.selectedIndex--;S.srvIdx=0;tryServer();}};
  $('nextep').onclick=()=>{if(es.selectedIndex<es.options.length-1){es.selectedIndex++;S.srvIdx=0;tryServer();}};
}
function setStatus(st,txt){
  const dot=$('sdot');if(dot)dot.className='sdot '+st;setT('stxt',txt);
}
function playTrailer(){
  const v=S.cur?.videos?.results?.find(x=>x.type==='Trailer')||S.cur?.videos?.results?.[0];
  if(v)window.open(`https://youtube.com/watch?v=${v.key}`,'_blank');
  else toast(L('noTrailer'));
}
function dlItem(){
  window.open(`https://www.google.com/search?q=${encodeURIComponent((S.cur.title||S.cur.name)+' download 1080p')}`,'_blank');
}
function refreshWlBtn(id,data){
  const inWl=S.wl.some(i=>i.id===id);
  const btn=$('wlbtn');if(!btn)return;
  btn.innerHTML=inWl
    ?'<svg width="15" height="15" fill="#E50914" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/></svg>'
    :'<svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>';
  btn.onclick=()=>toggleWl(data);
}
function toggleWl(item){
  const idx=S.wl.findIndex(i=>i.id===item.id);
  if(idx>-1){S.wl.splice(idx,1);toast(L('remWl'));}
  else{S.wl.unshift(item);toast(L('addWl'));}
  localStorage.setItem('mzwl',JSON.stringify(S.wl));
  refreshWlBtn(item.id,item);
}
function closePlayer(){
  clearTimeout(S.srvTimer);exitFS();
  const m=$('pm');m.classList.remove('open');
  setTimeout(()=>{m.classList.add('gone');$('vf').src='about:blank';},340);
}

// ═══════════════ FULLSCREEN ═══════════════
function toggleFS(){
  const f=$('vwrap');
  const reqFS=f.requestFullscreen||f.webkitRequestFullscreen||f.mozRequestFullScreen||f.msRequestFullscreen;
  if(reqFS&&(document.fullscreenEnabled||document.webkitFullscreenEnabled)){
    if(!document.fullscreenElement&&!document.webkitFullscreenElement){reqFS.call(f).catch(()=>toggleCssFS());}
    else{
        if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
    return;
  }
  toggleCssFS();
}
function toggleCssFS(){
  const vw=$('vwrap');const on=vw.classList.toggle('fs-on');
  $('fs-exp').style.display=on?'none':'block';
  $('fs-col').style.display=on?'block':'none';
  document.body.style.overflow=on?'hidden':'';
  if(on){try{screen.orientation.lock('landscape').catch(()=>{});}catch(e){}}
  else{try{screen.orientation.unlock();}catch(e){}}
}
function exitFS(){
  const vw=$('vwrap');if(vw&&vw.classList.contains('fs-on'))toggleCssFS();
  if(document.fullscreenElement||document.webkitFullscreenElement){
    if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
['fullscreenchange','webkitfullscreenchange'].forEach(ev=>document.addEventListener(ev,()=>{
  const on=!!(document.fullscreenElement||document.webkitFullscreenElement);
  const e=$('fs-exp'),c=$('fs-col');if(e)e.style.display=on?'none':'block';if(c)c.style.display=on?'block':'none';
}));

// ═══════════════ SEARCH ═══════════════
function openSearch(){
  S.searchOpen=true;
  const p=$('pg-search');p.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('open')));
  setTimeout(()=>{const si=$('si');if(si){si.focus();si.select();}},260);
  renderSrEmpty(L('startSearch'));
}
function closeSearch(){
  S.searchOpen=false;
  const p=$('pg-search');p.classList.remove('open');
  setTimeout(()=>{p.style.display='none';},280);
  const si=$('si');if(si)si.value='';
}
function renderSrEmpty(msg){
  setH('sr',`<div class="sr-empty"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><p>${msg}</p></div>`);
  const cnt=$('sr-count');if(cnt)cnt.style.display='none';
}
function clearFilters(){
  ['sf-type','sf-genre','sf-sort','sf-from','sf-origlang'].forEach(id=>{
    const el=$(id);if(!el)return;
    if(el.tagName==='SELECT')el.value=id==='sf-type'?'multi':id==='sf-sort'?'popularity.desc':'';
    else el.value='';
  });
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  const q=getV('si','').trim();
  if(q)doSearch(q);else renderSrEmpty(L('startSearch'));
}
async function applyFilters(){await doSearch(getV('si','').trim());}

async function doSearch(q){
  const res=$('sr'),cntEl=$('sr-count');
  const type=getV('sf-type','multi'),genre=getV('sf-genre','');
  const sort=getV('sf-sort','popularity.desc');
  const from=getV('sf-from',''),lang=getV('sf-origlang','');
  $('chip-type')?.classList.toggle('on',type!=='multi');
  $('chip-genre')?.classList.toggle('on',!!genre);
  $('chip-lang')?.classList.toggle('on',!!lang);
  $('chip-year')?.classList.toggle('on',!!from);
  if(res)res.innerHTML='<div class="sr-empty"><div class="spinner" style="margin:0 auto"></div></div>';
  if(cntEl)cntEl.style.display='none';
  let results=[];
  try{
    if(genre||from||lang||!q){
      const dt=type==='multi'?'movie':type;
      let ep=`discover/${dt}?sort_by=${sort}&`;
      if(genre)ep+=`with_genres=${genre}&`;if(lang)ep+=`with_original_language=${lang}&`;
      if(from)ep+=`primary_release_date.gte=${from}-01-01&first_air_date.gte=${from}-01-01&`;
      ep+='vote_count.gte=5&';
      const d=await api(ep);results=d.results||[];
      if(type==='multi'){
        let ep2=`discover/tv?sort_by=${sort}&`;
        if(genre)ep2+=`with_genres=${genre}&`;if(lang)ep2+=`with_original_language=${lang}&`;
        if(from)ep2+=`first_air_date.gte=${from}-01-01&`;
        const d2=await api(ep2);
        results=[...results,...(d2.results||[])].sort((a,b)=>b.popularity-a.popularity);
      }
    }else{
      const ep=type==='multi'?`search/multi?query=${encodeURIComponent(q)}&`:`search/${type}?query=${encodeURIComponent(q)}&`;
      const d=await api(ep);results=d.results||[];
      if(from)results=results.filter(i=>parseInt((i.release_date||i.first_air_date||'0').split('-')[0])>=parseInt(from));
      if(lang)results=results.filter(i=>i.original_language===lang);
      if(genre)results=results.filter(i=>i.genre_ids?.includes(parseInt(genre)));
    }
  }catch(e){console.error(e);}
  results=results.filter(i=>i.poster_path||i.profile_path);
  if(!results.length){renderSrEmpty(L('noResults'));return;}
  if(cntEl){cntEl.style.display='block';cntEl.textContent=`${results.length} ${L('results')}`;}
  const people=results.filter(i=>i.media_type==='person'||(!i.title&&!i.name&&i.profile_path));
  const titles=results.filter(i=>i.media_type!=='person'&&(i.title||i.name));
  let html='';
  if(titles.length){
    if(people.length)html+=`<div class="sr-group-label">${L('movies')} & ${L('series')}</div>`;
    html+=titles.map(i=>{
      const type=i.media_type||(i.title?'movie':'tv');
      const yr=(i.release_date||i.first_air_date||'').split('-')[0];
      const safe=(i.title||i.name||'').replace(/"/g,'"');
      return `<div class="sr-row" role="button" tabindex="0"
        onclick="openPlayer(${i.id},'${type}');closeSearch()"
        onkeydown="if(event.key==='Enter')this.click()">
        <img class="sr-poster" src="${i.poster_path?IMG+i.poster_path:'https://placehold.co/46x69/141428/444?text=?'}" alt="${safe}" loading="lazy" decoding="async">
        <div class="sr-info">
          <div class="sr-name">${i.title||i.name||''}</div>
          <div class="sr-metas">
            ${yr?`<span class="sr-year">${yr}</span>`:''}
            <span class="sr-tag ${type}">${type==='tv'?L('series'):L('movies')}</span>
            ${i.vote_average&&i.vote_average>0?`<span class="sr-score"><svg width="9" height="9" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>${i.vote_average.toFixed(1)}</span>`:''}
          </div>
        </div>
        <button class="sr-play" tabindex="-1" aria-hidden="true">
          <svg fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
        </button>
      </div>`;
    }).join('');
  }
  if(people.length){
    if(titles.length)html+=`<div class="sr-group-label">People</div>`;
    html+=people.map(i=>`<div class="sr-person" role="button" tabindex="0"
      onclick="showPage('person',${i.id});closeSearch()"
      onkeydown="if(event.key==='Enter')this.click()">
      <img class="sr-av" src="${i.profile_path?IMG+i.profile_path:'https://placehold.co/46x46/141428/444?text=?'}" alt="${(i.name||'').replace(/"/g,'"')}" loading="lazy">
      <div>
        <div class="sr-pname">${i.name||''}</div>
        <div class="sr-pdept">${i.known_for_department||'Actor'}</div>
      </div>
    </div>`).join('');
  }
  if(res){res.innerHTML=html;res.scrollTop=0;}
}

// ═══════════════ INIT ═══════════════
applyTheme();
applyLang();
showPage('home');

// Search input
const _si=$('si');
if(_si){
  let _lq='';
  _si.addEventListener('input',e=>{
    const q=e.target.value.trim();
    if(q===_lq)return;_lq=q;
    clearTimeout(S._st);
    if(q.length>=1)S._st=setTimeout(()=>doSearch(q),260);
    else renderSrEmpty(L('startSearch'));
  });
  _si.addEventListener('keydown',e=>{
    if(e.key==='Escape')closeSearch();
    if(e.key==='Enter'){clearTimeout(S._st);doSearch(_si.value.trim());}
  });
}
window.addEventListener('popstate',()=>{if(S.searchOpen)closeSearch();});
</script>
