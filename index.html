<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#090912">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mz Cinema">
<title>Mz Cinema</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E50914;--red2:#ff2d3b;--red-dim:rgba(229,9,20,.13);--red-glow:rgba(229,9,20,.32);
  --gold:#f5c518;--green:#22c55e;
  --bg:#090912;--s0:#0d0d18;--s1:#11111f;--s2:#161628;--s3:#1d1d35;--s4:#252542;--s5:#2e2e52;
  --t1:#f2f2fc;--t2:#9090b8;--t3:#55556a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --glass:rgba(9,9,18,.88);--glass2:rgba(9,9,18,.96);
  --sidebar:264px;--r:12px;--r-sm:8px;
  --ease:cubic-bezier(.4,0,.2,1);--fast:.15s;--mid:.25s;--slow:.35s;
}
html[data-theme=light]{--bg:#f0f0f8;--s0:#fff;--s1:#f8f8ff;--s2:#eeeef8;--s3:#e0e0f0;--s4:#d0d0e8;--s5:#c0c0d8;--t1:#080812;--t2:#4a4a6a;--t3:#888;--border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.13);--glass:rgba(240,240,248,.9);--glass2:rgba(240,240,248,.97)}
html,body{overscroll-behavior-y:none}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);-webkit-tap-highlight-color:transparent;overflow-x:hidden;min-height:100dvh;transition:background var(--mid),color var(--mid)}
body.ar,body.ar *{font-family:'Cairo',sans-serif!important}
body.ar{direction:rtl}
body.ar .sidebar{left:auto;right:0;border-right:none;border-left:1px solid var(--border)}
body.ar #app{margin-left:0}
@media(min-width:768px){body.ar #app{margin-right:var(--sidebar)}}
body.ar .nav-item{text-align:right}
body.ar .macts{flex-direction:row-reverse}
body.ar .hs{direction:ltr}
body.ar #si{padding:11px 44px 11px 14px;text-align:right}
body.ar .si-icon{left:auto;right:14px}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--s5);border-radius:4px}

/* &#9472;&#9472; SIDEBAR &#9472;&#9472; */
.sidebar{position:fixed;inset-y:0;left:0;width:var(--sidebar);background:var(--s0);border-right:1px solid var(--border);display:none;flex-direction:column;padding:16px 10px;z-index:50;overflow-y:auto;transition:background var(--mid)}
@media(min-width:768px){.sidebar{display:flex}}
.sb-logo{display:flex;align-items:center;gap:8px;padding:6px 12px 24px;cursor:pointer}
.sb-logo-text{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;line-height:1}
.sb-logo-text em{color:var(--red);font-style:normal}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red-glow);flex:none;margin-top:-14px}
.sb-sec{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);padding:0 12px;margin:14px 0 4px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--t2);transition:background var(--fast),color var(--fast);width:100%;text-align:left}
.nav-item svg{flex:none;width:17px;height:17px;stroke-width:1.8}
.nav-item:hover{background:var(--s2);color:var(--t1)}
.nav-item.active{background:var(--red-dim);color:var(--red)}
.nav-item.active svg{stroke:var(--red)}
.sb-footer{margin-top:auto;padding-top:14px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border)}
.sb-toggle{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--r-sm);background:var(--s2);border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--t1);transition:border-color var(--fast)}
.sb-toggle:hover{border-color:var(--red)}
.pill-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px}
.switch{width:36px;height:20px;border-radius:10px;background:var(--s5);position:relative;transition:background var(--fast);flex:none;pointer-events:none}
.switch.on{background:var(--red)}
.switch::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left var(--fast)}
.switch.on::after{left:19px}

/* &#9472;&#9472; MOBILE HEADER &#9472;&#9472; */
.mhdr{position:fixed;top:0;left:0;right:0;z-index:40;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;padding-top:env(safe-area-inset-top,0px);background:linear-gradient(180deg,var(--glass2) 60%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
@media(min-width:768px){.mhdr{display:none}}
.m-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;display:flex;align-items:center;gap:5px}
.m-logo em{color:var(--red);font-style:normal}
.m-dot{width:5px;height:5px;border-radius:50%;background:var(--red);margin-top:-10px}
.macts{display:flex;gap:6px}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--t1);transition:all var(--fast);touch-action:manipulation}
.icon-btn:hover{border-color:var(--red);color:var(--red)}
.icon-btn svg{width:16px;height:16px;stroke-width:1.8}
.icon-btn:active{transform:scale(.92)}

/* &#9472;&#9472; BOTTOM NAV &#9472;&#9472; */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--glass);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
@media(min-width:768px){.bnav{display:none}}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;color:var(--t3);transition:color var(--fast);position:relative;touch-action:manipulation}
.bnav-item svg{width:20px;height:20px;stroke-width:1.8}
.bnav-item span{font-size:9px;font-weight:600;letter-spacing:.2px}
.bnav-item.active{color:var(--red)}
.bnav-item.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2.5px;background:var(--red);border-radius:0 0 3px 3px}
.bnav-item:active{opacity:.7}

/* &#9472;&#9472; LAYOUT &#9472;&#9472; */
#app{min-height:100dvh;padding-bottom:calc(62px + env(safe-area-inset-bottom,0px))}
@media(min-width:768px){#app{margin-left:var(--sidebar);padding-bottom:0}}
.page{display:none;min-height:100dvh}
.page.active{display:block}

/* &#9472;&#9472; HERO &#9472;&#9472; */
.hero{position:relative;width:100%;height:72vh;min-height:400px;max-height:660px;overflow:hidden;background:var(--s1)}
@media(min-width:768px){.hero{height:84vh;max-height:740px}}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .9s var(--ease);z-index:0;pointer-events:none}
.slide.on{opacity:1;z-index:1;pointer-events:auto}
.slide-img{width:100%;height:100%;object-fit:cover}
.slide-fog{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg) 0%,rgba(9,9,18,.6) 38%,rgba(9,9,18,.08) 70%,rgba(9,9,18,.28) 100%)}
html[data-theme=light] .slide-fog{background:linear-gradient(0deg,var(--bg) 0%,rgba(240,240,248,.7) 40%,rgba(240,240,248,.06) 70%)}
.slide-body{position:absolute;bottom:0;left:0;right:0;padding:24px 18px 60px;z-index:2}
@media(min-width:768px){.slide-body{padding:40px 40px 50px;max-width:680px}}
.slide-type{display:inline-flex;align-items:center;gap:5px;background:var(--red);color:#fff;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:4px;margin-bottom:10px}
.slide-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,8.5vw,72px);line-height:1.02;letter-spacing:2px;margin-bottom:10px;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.slide-pills{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:rgba(255,255,255,.82);background:rgba(255,255,255,.1);backdrop-filter:blur(8px);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.12)}
.pill.gold{color:var(--gold);border-color:rgba(245,197,24,.28);background:rgba(245,197,24,.1)}
.slide-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-watch{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;font-size:13px;font-weight:700;padding:11px 24px;border-radius:50px;transition:all var(--fast);box-shadow:0 6px 24px var(--red-glow);text-transform:uppercase;letter-spacing:.6px;touch-action:manipulation}
.btn-watch:hover{transform:translateY(-1px);box-shadow:0 10px 32px var(--red-glow)}
.btn-watch:active{transform:scale(.96)}
.btn-info{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:50px;border:1px solid rgba(255,255,255,.22);transition:all var(--fast);backdrop-filter:blur(6px);touch-action:manipulation}
.btn-info:hover{background:rgba(255,255,255,.22)}
.btn-info:active{transform:scale(.96)}
.hero-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;opacity:0;transition:all var(--fast);backdrop-filter:blur(8px);touch-action:manipulation}
.hero:hover .hero-nav{opacity:1}
.hero-nav:hover{background:var(--red);border-color:var(--red)}
.hero-nav.prev{left:14px}
.hero-nav.next{right:14px}
.hero-nav svg{width:16px;height:16px;stroke-width:2.2}
.hero-dots{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:5px}
.dot-btn{width:5px;height:5px;border-radius:3px;background:rgba(255,255,255,.28);transition:all var(--mid)}
.dot-btn.on{width:20px;background:var(--red)}

/* &#9472;&#9472; SECTIONS &#9472;&#9472; */
.content{padding:4px 0 0;position:relative;z-index:2}
.section{padding:18px 0 4px}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:0 18px;margin-bottom:12px}
@media(min-width:768px){.section-head{padding:0 28px}}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.2px;display:flex;align-items:center;gap:9px}
.section-title::before{content:'';display:inline-block;width:3px;height:18px;background:linear-gradient(180deg,#ff5555,var(--red));border-radius:2px;flex:none;box-shadow:0 0 8px var(--red-glow)}
.see-all{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1px;padding:4px 2px;touch-action:manipulation}
.hs{display:flex;gap:10px;overflow-x:auto;padding:2px 18px 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hs::-webkit-scrollbar{display:none}
@media(min-width:768px){.hs{padding:2px 28px 14px;gap:13px}}

/* &#9472;&#9472; CARDS &#9472;&#9472; */
.card{flex:none;cursor:pointer;position:relative;border-radius:var(--r);overflow:hidden;transition:transform var(--fast),box-shadow var(--fast);touch-action:manipulation}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.5)}
.card:active{transform:scale(.95)}
.card-img{aspect-ratio:2/3;background:var(--s2);position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease);display:block}
.card:hover .card-img img{transform:scale(1.06)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(9,9,18,.96) 0%,rgba(9,9,18,.18) 65%,transparent 100%);opacity:0;transition:opacity var(--fast);display:flex;align-items:flex-end;padding:10px}
.card:hover .card-overlay{opacity:1}
.card-play{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px var(--red-glow)}
.card-play svg{width:12px;height:12px;margin-left:2px}
.card-badge{position:absolute;top:7px;left:7px;background:var(--red);color:#fff;font-size:7px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.card-score{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);color:var(--gold);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.card-prog{position:absolute;bottom:0;left:0;height:2px;background:var(--red)}
.card-body{padding:7px 2px 3px}
.card-title{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1)}
.card-year{font-size:10px;color:var(--t2);margin-top:2px}
.csm{width:126px}
@media(min-width:768px){.csm{width:148px}}
.cgc{width:100%}

/* &#9472;&#9472; CATEGORY CHIPS &#9472;&#9472; */
.cat-chip{flex:none;cursor:pointer;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px 17px;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:88px;transition:all var(--fast);touch-action:manipulation}
.cat-chip:hover{border-color:var(--red);transform:translateY(-2px)}
.cat-chip:active{transform:scale(.94)}
.cat-emoji{font-size:26px}
.cat-label{font-size:10px;font-weight:600;color:var(--t2);text-align:center}

/* &#9472;&#9472; BROWSE &#9472;&#9472; */
.page-top{padding:70px 18px 14px}
@media(min-width:768px){.page-top{padding:34px 28px 14px}}
.page-heading{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px}
.genre-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-top:12px;scrollbar-width:none}
.genre-bar::-webkit-scrollbar{display:none}
.genre-btn{flex:none;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--s2);color:var(--t2);transition:all var(--fast);white-space:nowrap;touch-action:manipulation}
.genre-btn:hover,.genre-btn.on{background:var(--red);border-color:var(--red);color:#fff}
.sort-strip{display:flex;align-items:center;gap:8px;padding:8px 18px 12px;flex-wrap:wrap}
@media(min-width:768px){.sort-strip{padding:8px 28px 12px}}
.sort-label{font-size:11px;color:var(--t2);font-weight:600}
.sort-select{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--t1);font-size:11px;padding:5px 10px;outline:none}
.content-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 18px}
@media(min-width:480px){.content-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.content-grid{grid-template-columns:repeat(4,1fr);padding:0 28px;gap:12px}}
@media(min-width:1024px){.content-grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:1280px){.content-grid{grid-template-columns:repeat(6,1fr)}}
.load-more-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:calc(100% - 36px);margin:16px 18px;padding:13px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);color:var(--t1);font-size:13px;font-weight:600;transition:all var(--fast);touch-action:manipulation}
.load-more-btn:hover{border-color:var(--red);color:var(--red)}
.load-more-btn:active{transform:scale(.98)}

/* &#9472;&#9472; WATCHLIST &#9472;&#9472; */
.wl-top{padding:70px 18px 14px}
@media(min-width:768px){.wl-top{padding:34px 28px 14px}}
.wl-stats{display:flex;gap:10px;margin-top:10px}
.stat-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);line-height:1}
.stat-lbl{font-size:10px;color:var(--t2);margin-top:2px}
.wl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 18px}
@media(min-width:480px){.wl-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.wl-grid{grid-template-columns:repeat(4,1fr);padding:0 28px}}
.wl-empty{text-align:center;padding:64px 20px;color:var(--t2)}
.wl-empty svg{width:52px;height:52px;margin:0 auto 14px;opacity:.2}
.wl-empty h3{font-size:18px;font-weight:700;margin-bottom:7px;color:var(--t1)}
.wl-empty p{font-size:13px;line-height:1.65}

/* &#9472;&#9472; PERSON &#9472;&#9472; */
.person-hero{padding:72px 18px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}
@media(min-width:768px){.person-hero{padding:38px 28px 20px;flex-direction:row;align-items:flex-start}}
.person-av{width:112px;height:112px;border-radius:50%;object-fit:cover;border:2px solid var(--red);background:var(--s2);flex:none}
.person-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px}
.person-tags{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 10px}
.person-tag{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:3px 9px;font-size:10px;color:var(--t2)}
.person-bio{font-size:13px;color:var(--t2);line-height:1.8;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}

/* &#9472;&#9472; DETAIL PAGE &#9472;&#9472; */
#pg-detail{position:fixed;inset:0;background:var(--bg);z-index:65;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform var(--slow) var(--ease)}
#pg-detail.open{transform:translateY(0)}
#pg-detail.gone{display:none!important}
.det-backdrop{position:relative;width:100%;aspect-ratio:16/9;max-height:52vw;overflow:hidden;background:var(--s1);flex:none}
.det-backdrop img{width:100%;height:100%;object-fit:cover;display:block}
.det-fog{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg) 0%,rgba(9,9,18,.42) 55%,rgba(9,9,18,.08) 100%)}
.det-topbar{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;padding:calc(12px + env(safe-area-inset-top,0px)) 14px 12px}
.det-body{padding:0 18px 120px}
@media(min-width:768px){.det-body{padding:0 32px 80px;max-width:900px;margin:0 auto}}
.det-poster-row{display:flex;gap:16px;align-items:flex-end;margin-top:-56px;margin-bottom:20px;position:relative;z-index:2}
.det-poster{width:96px;height:144px;border-radius:10px;object-fit:cover;flex:none;border:2px solid rgba(255,255,255,.12);box-shadow:0 8px 32px rgba(0,0,0,.7)}
@media(min-width:480px){.det-poster{width:118px;height:177px}}
.det-info{flex:1;min-width:0;padding-bottom:4px}
.det-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(21px,5.5vw,44px);letter-spacing:1.5px;line-height:1.05;margin-bottom:8px}
body.ar .det-title{font-size:clamp(17px,4.5vw,34px);letter-spacing:0}
.det-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.dtag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.3px}
.dtag.yr{background:var(--s3);color:var(--t2)}
.dtag.rt{background:rgba(245,197,24,.12);color:var(--gold);border:1px solid rgba(245,197,24,.2)}
.dtag.tp{background:var(--red-dim);color:var(--red)}
.dtag.du{background:var(--s3);color:var(--t2)}
.det-genres{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.dgenre{padding:4px 11px;border-radius:20px;background:var(--s3);border:1px solid var(--border);font-size:11px;color:var(--t2)}
.det-overview{font-size:13.5px;color:var(--t2);line-height:1.85;margin-bottom:20px}
.det-actions{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.btn-watch-big{flex:2;min-width:130px;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--red);color:#fff;font-size:14px;font-weight:700;padding:14px 20px;border-radius:12px;transition:all var(--fast);box-shadow:0 6px 24px var(--red-glow);text-transform:uppercase;letter-spacing:.5px;touch-action:manipulation}
.btn-watch-big:hover{transform:translateY(-2px);box-shadow:0 10px 32px var(--red-glow)}
.btn-watch-big:active{transform:scale(.96)}
.btn-det{flex:1;min-width:48px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:var(--s2);color:var(--t1);font-size:11px;font-weight:600;padding:12px 10px;border-radius:12px;border:1px solid var(--border2);transition:all var(--fast);touch-action:manipulation}
.btn-det:hover,.btn-det.on{border-color:var(--red);color:var(--red)}
.btn-det:active{transform:scale(.96)}
.btn-det svg{width:18px;height:18px;stroke-width:1.8}
.btn-det-lbl{font-size:9px;display:block;margin-top:3px;font-weight:600}
.det-sh{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.det-sh::before{content:'';width:3px;height:16px;background:var(--red);border-radius:2px;display:inline-block;box-shadow:0 0 6px var(--red-glow)}
.det-div{height:1px;background:var(--border);margin:18px 0}
/* Star rating */
.star-rate{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--s2);border:1px solid var(--border);border-radius:10px;margin-bottom:18px}
.sr-lbl{font-size:11px;color:var(--t2);font-weight:600}
.sr-stars{display:flex;gap:3px}
.sr-star{font-size:22px;cursor:pointer;transition:transform .1s;opacity:.3;touch-action:manipulation;user-select:none}
.sr-star.on{opacity:1}
.sr-star:hover{transform:scale(1.2);opacity:1}
.sr-num{font-size:12px;color:var(--gold);font-weight:700;min-width:24px}

/* &#9472;&#9472; PLAYER &#9472;&#9472; */
#pm{position:fixed;inset:0;background:var(--bg);z-index:70;display:flex;flex-direction:column;transform:translateY(100%);transition:transform var(--slow) var(--ease);overflow:hidden}
#pm.open{transform:translateY(0)}
#pm.gone{display:none}
.player-bar{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top,0px));background:linear-gradient(180deg,var(--glass2) 0%,transparent 100%)}
.player-bar-title{font-size:14px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 10px}
.player-bar-actions{display:flex;gap:6px;flex:none}
/* Video wrapper */
.vwrap{width:100%;background:#000;position:relative;flex:none}
.vwrap::after{content:'';display:block;padding-bottom:56.25%}
/* Native video */
#vplayer{position:absolute;inset:0;width:100%;height:100%;background:#000;display:none;object-fit:contain}
#vplayer.active{display:block}
video::cue{font-size:1.1em;background:rgba(0,0,0,.8);color:#fff;padding:2px 6px;border-radius:3px}
/* Iframe fallback */
#vf{position:absolute;inset:0;width:100%;height:100%;border:none}
/* Loading overlay */
#ld{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:var(--bg)}
#ldp{font-size:12px;color:var(--t2)}
/* Custom native controls */
#vctrls{position:absolute;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,transparent 100%);padding:32px 12px 10px;display:none;flex-direction:column;gap:6px;transition:opacity .3s}
#vctrls.vis{display:flex}
.vc-row{display:flex;align-items:center;gap:8px}
#vprog{flex:1;height:4px;-webkit-appearance:none;appearance:none;border-radius:2px;background:rgba(255,255,255,.25);cursor:pointer;outline:none}
#vprog::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--red);cursor:pointer}
.vc-btn{background:none;border:none;color:#fff;cursor:pointer;padding:4px;opacity:.9;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.vc-btn:hover{opacity:1}
.vc-btn svg{width:18px;height:18px;stroke-width:2}
#vtime{font-size:11px;color:rgba(255,255,255,.8);font-variant-numeric:tabular-nums;white-space:nowrap}
#vsub-sel{background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:10px;border-radius:6px;padding:3px 6px;max-width:90px;font-family:inherit}
#vvol{width:56px;height:4px;-webkit-appearance:none;appearance:none;border-radius:2px;background:rgba(255,255,255,.25);cursor:pointer}
#vvol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
#vqbadge{position:absolute;top:10px;left:10px;z-index:12;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.12);color:var(--gold);font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;display:none;letter-spacing:.5px}
/* Fullscreen */
#fs-btn{position:absolute;bottom:10px;right:10px;z-index:10;width:34px;height:34px;border-radius:var(--r-sm);background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);color:#fff;display:flex;align-items:center;justify-content:center;transition:all var(--fast);opacity:.8;touch-action:manipulation}
#fs-btn:hover{opacity:1;border-color:var(--red)}
#fs-btn svg{width:16px;height:16px;stroke-width:2}
.vwrap.fs-on{position:fixed!important;inset:0!important;z-index:200!important;padding-bottom:0!important}
.vwrap.fs-on::after{display:none}
.vwrap.fs-on #vf,.vwrap.fs-on #vplayer{position:absolute;inset:0;width:100%;height:100%}
.vwrap.fs-on #fs-btn{position:fixed;bottom:16px;right:16px;z-index:201;width:40px;height:40px;opacity:1}
/* Player body */
.player-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none}
.player-body::-webkit-scrollbar{display:none}
.player-meta{padding:18px 18px 40px}
@media(min-width:768px){.player-meta{padding:22px 28px 40px}}
.player-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1.2px;margin-bottom:10px;line-height:1.1}
.info-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.info-pill{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--t2)}
.info-pill.gold{color:var(--gold);border-color:rgba(245,197,24,.25);background:rgba(245,197,24,.07)}
.player-desc{font-size:14px;color:var(--t2);line-height:1.8;margin-bottom:18px}
.player-actions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.p-btn-w{flex:1;min-width:110px;display:flex;align-items:center;justify-content:center;gap:7px;background:rgba(255,255,255,.95);color:#000;font-size:12px;font-weight:700;padding:11px 16px;border-radius:10px;transition:all var(--fast);text-transform:uppercase;letter-spacing:.5px;touch-action:manipulation}
.p-btn-w:hover{background:#fff}
.p-btn-w:active{transform:scale(.96)}
html[data-theme=light] .p-btn-w{background:var(--red);color:#fff}
.p-btn-d{flex:1;min-width:110px;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--s2);color:var(--t1);font-size:12px;font-weight:700;padding:11px 16px;border-radius:10px;border:1px solid var(--border);transition:all var(--fast);text-transform:uppercase;letter-spacing:.5px;touch-action:manipulation}
.p-btn-d:hover{border-color:var(--red);color:var(--red)}
.p-btn-d:active{transform:scale(.96)}
/* Source bar */
.source-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:var(--s2);border:1px solid var(--border);font-size:11px;color:var(--t2);margin-bottom:12px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex:none;transition:background var(--fast)}
.sdot.ok{background:var(--green)}
.sdot.try{background:var(--gold);animation:blink .9s infinite}
.sdot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#src-prog{display:none;margin-bottom:12px}
#src-prog.on{display:block}
.src-track{display:flex;gap:3px;height:3px;border-radius:2px;overflow:hidden}
.src-seg{flex:1;height:100%;background:var(--s4);transition:background var(--fast);border-radius:2px}
.src-seg.done{background:var(--green)}
.src-seg.live{background:var(--gold);animation:blink .9s infinite}
.src-seg.fail{background:var(--red);opacity:.45}
#srv-manual{display:none;flex-wrap:wrap;gap:6px;margin-bottom:12px}
#srv-manual.on{display:flex}
.srv-btn{padding:6px 12px;border-radius:7px;background:var(--s2);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--t2);transition:all var(--fast);touch-action:manipulation}
.srv-btn:hover{border-color:var(--red);color:var(--red)}
.srv-btn.active{background:var(--red);border-color:var(--red);color:#fff}
/* TV controls */
.tv-ctrl{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:14px;display:none}
.tv-ctrl.on{display:block}
.tv-selects{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.tv-select{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--t1);font-size:12px;padding:8px 10px;outline:none}
.tv-nav{display:flex;gap:7px}
.tv-btn{flex:1;padding:9px;border-radius:var(--r-sm);background:var(--s3);color:var(--t1);font-size:11px;font-weight:600;transition:all var(--fast);touch-action:manipulation}
.tv-btn:hover{background:var(--red);color:#fff}
.meta-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.meta-divider{border-top:1px solid var(--border);margin:20px 0 16px}
/* Cast */
.cast-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{flex:none;width:62px;text-align:center;cursor:pointer;touch-action:manipulation}
.cast-av{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--s2);margin:0 auto 5px;border:2px solid var(--border);transition:border-color var(--fast),transform var(--fast);display:block}
.cast-card:hover .cast-av{border-color:var(--red);transform:scale(1.07)}
.cast-name{font-size:8.5px;font-weight:600;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cast-role{font-size:7.5px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
/* Similar */
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:10px}
@media(min-width:480px){.sim-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:768px){.sim-grid{grid-template-columns:repeat(5,1fr)}}

/* &#9472;&#9472; SEARCH &#9472;&#9472; */
#pg-search{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;transform:translateX(100%);transition:transform var(--mid) var(--ease);will-change:transform}
#pg-search.open{display:flex!important;transform:translateX(0)}
.search-header{display:flex;align-items:center;gap:10px;padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top,0px));background:var(--s1);border-bottom:1px solid var(--border);flex:none}
.si-wrap{flex:1;position:relative}
.si-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--t2);pointer-events:none}
#si{width:100%;background:var(--s2);border:1.5px solid transparent;border-radius:12px;padding:11px 14px 11px 42px;font-size:15px;color:var(--t1);font-family:inherit;outline:none;transition:border-color var(--fast),background var(--fast);-webkit-appearance:none}
#si:focus{border-color:var(--red);background:var(--s1)}
#si::placeholder{color:var(--t2);font-size:14px}
.search-cancel{color:var(--red);font-size:14px;font-weight:600;white-space:nowrap;padding:6px 0;flex:none;touch-action:manipulation}
.chip-bar{background:var(--s1);border-bottom:1px solid var(--border);height:46px;display:flex;align-items:center;gap:7px;padding:0 14px;flex:none;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chip-bar::-webkit-scrollbar{display:none}
.chip{flex:none;display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--s2);font-size:11px;font-weight:600;color:var(--t2);white-space:nowrap;transition:all var(--fast);touch-action:manipulation}
.chip select{background:none;border:none;color:inherit;font-size:11px;font-weight:600;font-family:inherit;outline:none;cursor:pointer;padding:0;-webkit-appearance:none;appearance:none;max-width:74px}
.chip svg{width:12px;height:12px;flex:none;stroke-width:2}
.chip.on,.chip:active{border-color:var(--red);background:var(--red-dim);color:var(--red)}
.chip.on select{color:var(--red)}
.chip-clear{flex:none;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;color:var(--red);touch-action:manipulation;white-space:nowrap}
#sr-count{flex:none;padding:9px 16px 3px;font-size:11px;font-weight:600;color:var(--t2);display:none}
#sr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:4px 8px 80px;display:flex;flex-direction:column;scrollbar-width:none}
#sr::-webkit-scrollbar{display:none}
.sr-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--t2);text-align:center;gap:10px;flex:1}
.sr-empty svg{width:40px;height:40px;opacity:.2}
.sr-empty p{font-size:14px;line-height:1.6}
.sr-group-label{padding:12px 8px 6px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.sr-row{display:flex;align-items:center;gap:12px;padding:9px 8px;border-radius:11px;cursor:pointer;user-select:none;transition:background var(--fast);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.sr-row:active{background:var(--s2)}
@media(hover:hover){.sr-row:hover{background:var(--s2)}}
.sr-poster{width:46px;height:69px;border-radius:8px;object-fit:cover;background:var(--s2);flex:none;display:block}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:14px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.sr-metas{display:flex;align-items:center;gap:5px;margin-top:4px;overflow:hidden}
.sr-tag{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;flex:none;background:var(--s3);color:var(--t2);text-transform:uppercase;letter-spacing:.3px}
.sr-tag.tv{background:var(--red-dim);color:var(--red)}
.sr-tag.movie{background:rgba(99,102,241,.12);color:#a5b4fc}
.sr-score{display:flex;align-items:center;gap:2px;font-size:10px;font-weight:700;color:var(--gold);flex:none;white-space:nowrap}
.sr-year{font-size:10px;color:var(--t2);flex:none}
.sr-play{width:34px;height:34px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--t2);flex:none;transition:all var(--fast)}
.sr-play svg{width:12px;height:12px;margin-left:2px}
.sr-person{display:flex;align-items:center;gap:12px;padding:9px 8px;border-radius:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background var(--fast)}
.sr-person:active{background:var(--s2)}
@media(hover:hover){.sr-person:hover{background:var(--s2)}}
.sr-av{width:46px;height:46px;border-radius:50%;object-fit:cover;background:var(--s2);flex:none;border:1.5px solid var(--border)}
.sr-pname{font-size:14px;font-weight:600;color:var(--t1)}
.sr-pdept{font-size:11px;color:var(--t2);margin-top:2px}

/* &#9472;&#9472; SHARE OVERLAY &#9472;&#9472; */
.sh-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:220;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity var(--mid)}
.sh-overlay.open{opacity:1;pointer-events:auto}
.sh-sheet{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:16px 20px calc(32px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform var(--slow) var(--ease)}
.sh-overlay.open .sh-sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--s5);border-radius:2px;margin:0 auto 18px}
.sh-ttl{font-size:15px;font-weight:700;text-align:center;margin-bottom:18px}
.sh-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sh-opt{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 8px;border-radius:12px;background:var(--s2);border:1px solid var(--border);cursor:pointer;transition:all var(--fast);touch-action:manipulation}
.sh-opt:hover,.sh-opt:active{border-color:var(--red)}
.sh-opt svg{width:22px;height:22px;stroke-width:1.8}
.sh-opt span{font-size:10px;font-weight:600;color:var(--t2)}

/* &#9472;&#9472; OFFLINE DOWNLOAD MODAL &#9472;&#9472; */
#dl-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity .25s}
#dl-modal.open{opacity:1;pointer-events:auto}
.dl-sheet{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:20px 20px calc(32px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#dl-modal.open .dl-sheet{transform:translateY(0)}
.dl-handle{width:36px;height:4px;background:var(--s5);border-radius:2px;margin:0 auto 18px}
.dl-title{font-size:16px;font-weight:700;margin-bottom:6px}
.dl-note{font-size:12px;color:var(--t2);margin-bottom:18px;line-height:1.6}
.dl-progress-wrap{height:6px;background:var(--s4);border-radius:3px;overflow:hidden;margin-bottom:10px;display:none}
.dl-progress-wrap.show{display:block}
.dl-bar{height:100%;background:linear-gradient(90deg,var(--red),#ff6b6b);border-radius:3px;width:0%;transition:width .3s}
.dl-status{font-size:12px;color:var(--t2);margin-bottom:16px;min-height:18px}
.dl-actions{display:flex;gap:10px}
/* Download links sheet */
.dl-links-grid{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;padding-bottom:4px}
.dl-link-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;touch-action:manipulation;text-decoration:none;color:var(--t1)}
.dl-link-item:hover{border-color:var(--red);background:var(--red-dim)}
.dl-link-item:active{transform:scale(.98)}
.dl-link-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.dl-link-title{font-size:13px;font-weight:700;color:var(--t1)}
.dl-link-meta{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dl-link-right{display:flex;align-items:center;gap:6px;flex:none;margin-left:10px}
.dl-badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.dl-badge.ar{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.dl-badge.q4k{background:rgba(245,197,24,.15);color:#f5c518;border:1px solid rgba(245,197,24,.25)}
.dl-badge.q1080{background:rgba(59,130,246,.15);color:#7dd3fc;border:1px solid rgba(59,130,246,.25)}
.dl-badge.q720{background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.25)}
.dl-badge.sub{background:rgba(168,85,247,.15);color:#d8b4fe;border:1px solid rgba(168,85,247,.25)}
.dl-badge.torr{background:rgba(229,9,20,.1);color:#ff6b6b;border:1px solid rgba(229,9,20,.2)}
.dl-divider-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:10px 0 6px}
.dl-searching{display:flex;align-items:center;gap:10px;padding:20px;justify-content:center;color:var(--t2);font-size:13px}
.dl-empty{text-align:center;padding:24px;color:var(--t2);font-size:13px}
.dl-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;transition:all .15s;touch-action:manipulation}
.dl-btn.primary{background:var(--red);color:#fff;box-shadow:0 4px 16px var(--red-glow)}
.dl-btn.primary:hover{transform:translateY(-1px)}
.dl-btn.secondary{background:var(--s2);color:var(--t2);border:1px solid var(--border)}
/* Offline library badge */
.offline-badge{position:absolute;top:7px;right:36px;background:var(--green);color:#fff;font-size:7px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.3px}
/* Server switcher panel */
#srv-panel{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .25s}
#srv-panel.open{opacity:1;pointer-events:auto}
.srv-sheet{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:16px 20px calc(32px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#srv-panel.open .srv-sheet{transform:translateY(0)}
.srv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:52vh;overflow-y:auto}
.srv-item{padding:10px 12px;border-radius:10px;background:var(--s2);border:1px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;touch-action:manipulation}
.srv-item:hover,.srv-item.active{border-color:var(--red);background:var(--red-dim)}
.srv-item-name{font-size:12px;font-weight:600;color:var(--t1)}
.srv-item-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.srv-item-badge.ar{background:rgba(34,197,94,.15);color:var(--green)}
.srv-item-badge.hd{background:rgba(245,197,24,.15);color:var(--gold)}
/* Arabic-first toggle */
.ar-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-bottom:14px;border-bottom:1px solid var(--border)}
.ar-toggle-lbl{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:7px}
/* &#9552;&#9552; MOBILE IMPROVEMENTS &#9552;&#9552; */
/* Larger touch targets on mobile */
@media(max-width:767px){
  .card-title{font-size:12px;}
  .card-year{font-size:10.5px;}
  .csm{width:110px;}
  .slide-title{font-size:clamp(28px,7.5vw,48px);}
  .btn-watch,.btn-info{padding:10px 18px;font-size:12px;}
  .player-meta{padding:14px 14px 40px;}
  .player-title{font-size:22px;}
  .player-desc{font-size:13px;}
  .info-pill{font-size:10px;padding:2px 8px;}
  .source-bar{font-size:10px;padding:7px 10px;}
  .tv-select{font-size:11px;padding:7px 8px;}
  .det-body{padding:0 14px 120px;}
  .det-title{font-size:clamp(19px,5vw,36px);}
  .det-overview{font-size:13px;}
  .page-heading{font-size:26px;}
  /* Section padding tighter on mobile */
  .section-head{padding:0 14px;}
  .hs{padding:2px 14px 14px;}
  .content-grid{gap:8px;padding:0 14px;}
  .wl-grid{padding:0 14px;}
}
/* Player actions &#8212; always 2 columns on mobile */
.player-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
@media(min-width:480px){.player-actions{display:flex;flex-wrap:wrap;}}
/* Download button always visible */
.p-btn-d{display:flex!important;visibility:visible!important;opacity:1!important;}
/* Better bottom nav labels */
.bnav-item span{font-size:9.5px;letter-spacing:0;}
/* Smoother hero on mobile */
@media(max-width:767px){
  .hero{height:65vh;min-height:360px;}
  .slide-body{padding:20px 14px 56px;}
  .hero-dots{bottom:16px;}
}
/* Detail page backdrop on mobile */
@media(max-width:767px){
  .det-backdrop{aspect-ratio:16/9;max-height:48vw;}
  .det-poster{width:80px;height:120px;}
  .det-poster-row{margin-top:-44px;gap:12px;}
  .det-actions{gap:6px;}
  .btn-watch-big{font-size:13px;padding:12px 16px;}
  .btn-det{padding:10px 8px;}
}
/* Source progress bar better on mobile */
.src-track{height:4px;}
.src-seg{border-radius:3px;}
/* Toast higher above nav */
@media(max-width:767px){#toast{bottom:76px;font-size:13px;}}
/* &#9552;&#9552; ARABIC RTL IMPROVEMENTS &#9552;&#9552; */
body.ar .player-actions{direction:rtl;}
body.ar .det-actions{direction:rtl;}
body.ar .slide-body{direction:rtl;text-align:right;}
body.ar .slide-pills{flex-direction:row-reverse;}
body.ar .info-pills{flex-direction:row-reverse;}
body.ar .player-bar-title{text-align:right;}
body.ar .det-tags{flex-direction:row-reverse;}
body.ar .det-genres{flex-direction:row-reverse;}
body.ar .search-header{flex-direction:row-reverse;}
body.ar #si{padding:11px 44px 11px 14px;}
body.ar .si-icon{left:auto;right:14px;}
body.ar .wl-stats{flex-direction:row-reverse;}
body.ar .player-meta{direction:rtl;}
body.ar .source-bar{flex-direction:row-reverse;}
body.ar .tv-nav{flex-direction:row-reverse;}
body.ar .tv-selects{direction:rtl;}
body.ar .cast-name,.body.ar .cast-role{direction:rtl;}
body.ar .section-title::before{margin-right:0;margin-left:9px;}
/* Fix Arabic number display */
body.ar .stat-num,.body.ar .card-score,.body.ar .card-year{direction:ltr;display:inline-block;}
/* &#9552;&#9552; END MOBILE &#9552;&#9552; */
/* &#9472;&#9472; MISC &#9472;&#9472; */
.spinner{width:28px;height:28px;border:2.5px solid var(--s4);border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-wrap{min-height:360px;display:flex;align-items:center;justify-content:center}
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
#toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(22,22,40,.95);border:1px solid rgba(255,255,255,.1);color:var(--t1);padding:10px 20px;border-radius:28px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:all var(--mid);white-space:nowrap;pointer-events:none;backdrop-filter:blur(16px);max-width:88vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 8px 32px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:26px}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp var(--mid) var(--ease) forwards}
</style>

  else if(name==='watchlist')renderWatchlist();
  else if(name==='person')loadPerson(param);
  else if(name==='cat')loadCat(param);
  else if(name==='toprated')loadTopRated();
  else if(name==='upcoming')loadUpcoming();
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// SLIDER
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
let slT=null,slI=0,slArr=[];
function slInit(items){
  slArr=items;slI=0;slAuto();
  return `<div class="hero" id="hero" onmouseenter="slStop()" onmouseleave="slAuto()">
    ${items.map((it,i)=>`<div class="slide${i===0?' on':''}" id="sl${i}">
      <img class="slide-img" src="${ORIG}${it.backdrop_path||it.poster_path}" alt="" loading="${i===0?'eager':'lazy'}">
      <div class="slide-fog"></div>
      <div class="slide-body">
        <div class="slide-type">${it.media_type==='tv'?L('series'):L('movies')}</div>
        <h1 class="slide-title">${it.title||it.name}</h1>
        <div class="slide-pills">
          <span class="pill gold">\u2605 ${(it.vote_average||0).toFixed(1)}</span>
          <span class="pill">${(it.release_date||it.first_air_date||'').split('-')[0]}</span>
          ${it.original_language?`<span class="pill">${it.original_language.toUpperCase()}</span>`:''}
        </div>
        <div class="slide-actions">
          <button class="btn-watch" onclick="openDetail(${it.id},'${it.media_type}')">
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
            ${S.lang==='ar'?'\u0634\u0627\u0647\u062F':'Watch'}
          </button>
          <button class="btn-info" onclick="openDetail(${it.id},'${it.media_type}')">
            ${S.lang==='ar'?'\u062A\u0641\u0627\u0635\u064A\u0644':'Info'}
          </button>
        </div>
      </div>
    </div>`).join('')}
    <button class="hero-nav prev" onclick="slPrev()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
    <button class="hero-nav next" onclick="slNext()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
    <div class="hero-dots">${items.map((_,i)=>`<button class="dot-btn${i===0?' on':''}" onclick="slGo(${i})"></button>`).join('')}</div>
  </div>`;
}
function slUpd(){document.querySelectorAll('.slide').forEach((e,i)=>e.classList.toggle('on',i===slI));document.querySelectorAll('.dot-btn').forEach((e,i)=>e.classList.toggle('on',i===slI));}
function slNext(){slI=(slI+1)%slArr.length;slUpd();}
function slPrev(){slI=(slI-1+slArr.length)%slArr.length;slUpd();}
function slGo(i){slI=i;slUpd();}
function slAuto(){slStop();slT=setInterval(slNext,6000);}
function slStop(){if(slT){clearInterval(slT);slT=null;}}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// CARD
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function card(it,cls='csm',isH=false){
  const type=it.media_type||(it.title?'movie':'tv');
  const yr=(it.release_date||it.first_air_date||'').split('-')[0];
  const safe=(it.title||it.name||'').replace(/"/g,'&quot;');
  return `<div class="card ${cls}" onclick="openDetail(${it.id},'${type}')" tabindex="0" role="button" aria-label="${safe}">
    <div class="card-img">
      <img src="${it.poster_path?IMG+it.poster_path:'https://placehold.co/300x450/161628/555?text=?'}" alt="${safe}" loading="lazy" decoding="async">
      <div class="card-overlay"><div class="card-play"><svg width="12" height="12" fill="white" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg></div></div>
      ${type==='tv'?`<div class="card-badge">${L('series')}</div>`:''}
      ${it.vote_average?`<div class="card-score">\u2605 ${it.vote_average.toFixed(1)}</div>`:''}
      ${isH?`<div class="card-prog" style="width:${30+it.id%48}%"></div>`:''}
    </div>
    <div class="card-body">
      <div class="card-title">${it.title||it.name||''}</div>
      ${yr?`<div class="card-year">${yr}</div>`:''}
    </div>
  </div>`;
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// HOME

async function loadHome(){
  slStop();
  const vc=$('vc-home');
  vc.innerHTML='<div class="loader-wrap"><div class="spinner"></div></div>';
  const [tr,kd,hi,an,mv,tu,ar,hw,sp]=await Promise.all([
    api('trending/all/day?'),
    api('discover/tv?with_original_language=ko&sort_by=popularity.desc&'),
    api('discover/movie?with_original_language=hi&sort_by=popularity.desc&'),

  ]);

  ].filter(s=>s.items&&s.items.length);
  vc.innerHTML=`${hero}<div class="content fade-up">
    <div class="section"><div class="section-head"><div class="section-title">${L('cats')}</div></div>
    <div class="hs">${CATS.map(c=>`<div class="cat-chip" onclick="showPage('cat','${c.key}')"><span class="cat-emoji">${c.emoji}</span><span class="cat-label">${c[S.lang]||c.en}</span></div>`).join('')}</div></div>
    ${secs.map(s=>`<div class="section"><div class="section-head"><div class="section-title">${L(s.key)}</div>${s.cat?`<button class="see-all" onclick="showPage('cat','${s.cat}')">${L('seeAll')}</button>`:''}</div><div class="hs">${s.items.map(i=>card(i,'csm',s.isH)).join('')}</div></div>`).join('')}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// BROWSE
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function loadBrowsePage(title,type,genres){
  const vc=$(`vc-${type==='movie'?'movies':'tv'}`);
  vc.innerHTML=`<div class="page-top fade-up"><div class="page-heading">${title}</div>
    <div class="genre-bar" id="gf-${type}">${genres.map(g=>`<button class="genre-btn${g.id===''?' on':''}" onclick="filterBrowse('${type}','${g.id}',this)">${g.n}</button>`).join('')}</div></div>
  <div class="sort-strip"><span class="sort-label">${S.lang==='ar'?'\u062A\u0631\u062A\u064A\u0628:':'Sort:'}</span>
    <select class="sort-select" id="sortsel-${type}" onchange="sortBrowse('${type}',this.value)">
      <option value="popularity.desc">${S.lang==='ar'?'\u0627\u0644\u0623\u0643\u062B\u0631 \u0634\u0639\u0628\u064A\u0629':'Most Popular'}</option>
      <option value="vote_average.desc">${S.lang==='ar'?'\u0627\u0644\u0623\u0639\u0644\u0649 \u062A\u0642\u064A\u064A\u0645\u0627\u064B':'Top Rated'}</option>
      <option value="release_date.desc">${S.lang==='ar'?'\u0627\u0644\u0623\u062D\u062F\u062B':'Newest'}</option>
    </select></div>
  <div class="content-grid" id="bg-${type}">${skel(12)}</div>
  <button class="load-more-btn" onclick="loadMoreBrowse('${type}')"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>${L('loadMore')}</button>`;
  loadBrowse(type,'','popularity.desc',1,true);
}
async function filterBrowse(type,gid,btn){
  S.curGenre=gid;S.curBrowsePage=1;
  document.querySelectorAll(`#gf-${type} .genre-btn`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  await loadBrowse(type,gid,$(`sortsel-${type}`)?.value||'popularity.desc',1,true);
}
async function sortBrowse(type,sort){S.curBrowsePage=1;await loadBrowse(type,S.curGenre,sort,1,true);}
async function loadBrowse(type,gid,sort,page,replace){
  const g=$(`bg-${type}`);if(!g)return;
  if(replace)g.innerHTML=skel(12);
  const ep=gid?`discover/${type}?with_genres=${gid}&sort_by=${sort}&page=${page}&vote_count.gte=20&`:`${type}/popular?page=${page}&`;
  const data=await api(ep);
  const html=data.results.filter(i=>i.poster_path).map(i=>card(i,'cgc')).join('');
  if(replace)g.innerHTML=html;else g.innerHTML+=html;
}
async function loadMoreBrowse(type){
  S.curBrowsePage++;
  const sort=$(`sortsel-${type}`)?.value||'popularity.desc';
  await loadBrowse(type,S.curGenre,sort,S.curBrowsePage,false);
}

// CATEGORY
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
async function loadCat(key){
  const cat=CATS.find(c=>c.key===key);if(!cat)return;
  const vc=$('vc-cat');
  vc.innerHTML='<div class="loader-wrap"><div class="spinner"></div></div>';
  const data=await api(cat.ep);
  vc.innerHTML=`<div style="padding-top:64px" class="fade-up">
    <div class="page-top" style="padding-top:14px"><div style="font-size:38px;margin-bottom:6px">${cat.emoji}</div><div class="page-heading">${cat[S.lang]||cat.en}</div></div>
    <div class="content-grid" id="catg-${key}">${data.results.filter(i=>i.poster_path).map(i=>card(i,'cgc')).join('')}</div>
    <button class="load-more-btn" id="cat-lm-${key}" onclick="loadMoreCat('${key}',2)">${L('loadMore')}</button>
  </div>`;
}
async function loadMoreCat(key,page){
  const cat=CATS.find(c=>c.key===key);if(!cat)return;
  const sep=cat.ep.includes('?')?'&':'?';
  const data=await api(`${cat.ep}${sep}page=${page}`);
  const g=$(`catg-${key}`);if(g)g.innerHTML+=data.results.filter(i=>i.poster_path).map(i=>card(i,'cgc')).join('');
  const btn=$(`cat-lm-${key}`);if(btn)btn.setAttribute('onclick',`loadMoreCat('${key}',${page+1})`);
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// NATIVE VIDEO PLAYER
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
let _vctrlTimer=null;
function showVctrls(){
  const c=$('vctrls');if(!c)return;
  c.classList.add('vis');
  clearTimeout(_vctrlTimer);
  _vctrlTimer=setTimeout(()=>{const v=$('vplayer');if(v&&!v.paused)c.classList.remove('vis');},3500);
}
function initNativePlayer(streamUrl,subs){
  _native=true;
  const v=$('vplayer'),f=$('vf'),vc=$('vctrls');
  v.classList.add('active');
  if(f){f.style.display='none';f.src='about:blank';}
  if(vc)vc.classList.add('vis');
  if(_hls){_hls.destroy();_hls=null;}
  while(v.firstChild)v.removeChild(v.firstChild);
  if(typeof Hls!=='undefined'&&Hls.isSupported()){
    _hls=new Hls({maxBufferLength:30,maxMaxBufferLength:60,enableWorker:true});
    _hls.loadSource(streamUrl);
    _hls.attachMedia(v);
    _hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      v.play().catch(()=>{});
      const ld=$('ld');if(ld)ld.style.display='none';
      setStatus('ok','\u25B6 Playing');
      const qb=$('vqbadge');
      if(qb&&_hls.levels&&_hls.levels[_hls.currentLevel]){qb.textContent=(_hls.levels[_hls.currentLevel].height||'')+'p';qb.style.display='block';}
    });
    _hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){_hls.destroy();_hls=null;S.srvIdx++;tryServer();}});
  } else if(v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=streamUrl;v.play().catch(()=>{});
    const ld=$('ld');if(ld)ld.style.display='none';
    setStatus('ok','\u25B6 Playing');
  } else {
    stopNativePlayer();S.srvIdx++;tryServer();return;
  }
  // Subtitles
  const sel=$('vsub-sel');
  if(sel){
    sel.innerHTML='<option value="-1">\uD83D\uDD07 Off</option>';
    (subs||[]).forEach((s,i)=>{
      const o=document.createElement('option');
      o.value=i;
      const isAr=s.lang==='ar'||s.label?.toLowerCase().includes('arab')||s.label?.toLowerCase().includes('arabic');
      o.textContent=(isAr?'\uD83C\uDDF8\uD83C\uDDE6 ':'')+( s.label||s.lang||'Sub '+(i+1));
      sel.appendChild(o);
      const t=document.createElement('track');
      t.kind='subtitles';t.src=s.file||s.url||s.src||'';
      t.label=o.textContent;t.srclang=s.lang||'und';
      if(isAr)t.default=true;
      v.appendChild(t);
    });
    // Auto select arabic
    setTimeout(()=>{
      const ai=(subs||[]).findIndex(s=>s.lang==='ar'||s.label?.toLowerCase().includes('arab')||s.label?.toLowerCase().includes('arabic'));
      if(ai>=0){sel.value=ai;vSetSub(ai);}
    },600);
  }
  v.addEventListener('timeupdate',()=>{
    const pg=$('vprog'),tm=$('vtime');
    if(pg&&v.duration){pg.max=v.duration;pg.value=v.currentTime;}
    if(tm)tm.textContent=fmt(v.currentTime)+' / '+fmt(v.duration||0);
  },{passive:true});
  const pg=$('vprog');if(pg)pg.addEventListener('input',()=>{if(v.duration)v.currentTime=parseFloat(pg.value);});
  v.addEventListener('play',()=>{const pi=$('vplay-ic'),pa=$('vpause-ic');if(pi)pi.style.display='none';if(pa)pa.style.display='';showVctrls();});
  v.addEventListener('pause',()=>{const pi=$('vplay-ic'),pa=$('vpause-ic');if(pi)pi.style.display='';if(pa)pa.style.display='none';showVctrls();});
  v.addEventListener('click',showVctrls);
  v.addEventListener('touchstart',showVctrls,{passive:true});
}
function stopNativePlayer(){
  _native=false;
  const v=$('vplayer'),f=$('vf'),vc=$('vctrls'),qb=$('vqbadge');
  if(_hls){_hls.destroy();_hls=null;}
  if(v){v.pause();v.src='';v.classList.remove('active');while(v.firstChild)v.removeChild(v.firstChild);}
  if(f){f.style.display='';} 
  if(vc)vc.classList.remove('vis');
  if(qb)qb.style.display='none';
}
function vPlayPause(){const v=$('vplayer');if(!v)return;if(v.paused)v.play();else v.pause();}
function vSetVol(val){const v=$('vplayer');if(v)v.volume=parseFloat(val);}
function vSetSub(idx){const v=$('vplayer');if(!v)return;Array.from(v.textTracks).forEach((t,i)=>{t.mode=i===parseInt(idx)?'showing':'hidden';});}
function vFS(){const w=$('vwrap');const req=w.requestFullscreen||w.webkitRequestFullscreen;if(req&&!document.fullscreenElement)req.call(w).catch(()=>{});else if(document.exitFullscreen)document.exitFullscreen().catch(()=>{});}

// PLAYER
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
async function openPlayer(id,type){
  slStop();
  const m=$('pm');m.classList.remove('gone');
  const ld=$('ld');if(ld)ld.style.display='flex';
  setT('ldp',L('srcTry'));setStatus('try',L('srcTry'));
  const sm=$('srv-manual');if(sm){sm.innerHTML='';sm.classList.remove('on');}
  const sp=$('src-prog');if(sp){sp.classList.remove('on');sp.querySelector('#src-track').innerHTML='';}
  stopNativePlayer();
  const vf=$('vf');if(vf){vf.onload=null;vf.onerror=null;vf.src='about:blank';}
  m.classList.add('open');
  S.cur={id,media_type:type};S.srvIdx=0;
  tryServer();
  const data=await apiDet(id,type);
  const wasPlaying=S.srvIdx>0;
  S.cur={...data,media_type:type};
  if(!wasPlaying){S.srvIdx=0;tryServer();}
  setT('ptxt',data.title||data.name);setT('pmttl',data.title||data.name);setT('pov',data.overview||'');
  const yr=(data.release_date||data.first_air_date||'').split('-')[0];
  const rt=data.runtime?`${data.runtime}m`:(data.episode_run_time?.[0]?`${data.episode_run_time[0]}m`:'');
  setH('ppills',`${yr?`<span class="info-pill">${yr}</span>`:''}${data.vote_average?`<span class="info-pill gold">\u2605 ${data.vote_average.toFixed(1)}</span>`:''}${rt?`<span class="info-pill">${rt}</span>`:''}${data.genres?.slice(0,3).map(g=>`<span class="info-pill">${g.name}</span>`).join('')||''}`);
  refreshWlBtn(id,data);
  setH('castl',data.credits?.cast?.slice(0,18).map(c=>`<div class="cast-card" onclick="showPage('person',${c.id});closePlayer()"><img class="cast-av" src="${c.profile_path?IMG+c.profile_path:'https://placehold.co/52x52/161628/555?text=?'}" alt="${c.name}" loading="lazy"><div class="cast-name">${c.name}</div><div class="cast-role">${c.character||''}</div></div>`).join('')||'');
  if(!data.adult){S.hist=S.hist.filter(i=>i.id!==id);S.hist.unshift(data);if(S.hist.length>30)S.hist.pop();localStorage.setItem('mzh',JSON.stringify(S.hist));}
  const sim=(data.similar?.results||data.recommendations?.results||[]).filter(i=>i.poster_path).slice(0,8);
  setH('siml',sim.map(i=>card(i,'cgc')).join(''));
  const tc=$('tvctrl');
  if(type==='tv'){
    tc.classList.add('on');
    const ss=$('ssel');
    ss.innerHTML=data.seasons?.filter(s=>s.season_number>0).map(s=>`<option value="${s.season_number}">Season ${s.season_number}</option>`).join('')||'';
    ss.onchange=async()=>{
      const sd=await api(`tv/${id}/season/${ss.value}?`);
      const es=$('esel');
      es.innerHTML=sd.episodes?.map(e=>`<option value="${e.episode_number}">Ep ${e.episode_number}: ${e.name}</option>`).join('')||'';
      es.onchange=()=>{S.srvIdx=0;stopNativePlayer();tryServer();};
      setupEpNav();S.srvIdx=0;stopNativePlayer();tryServer();
    };
    ss.dispatchEvent(new Event('change'));
  } else {tc.classList.remove('on');}
  const pb=document.querySelector('.player-body');if(pb)pb.scrollTop=0;
}

function buildUrl(idx){
  const d=S.cur,s=getV('ssel','1'),e=getV('esel','1');
  const srv=(_orderedSrvs.length?_orderedSrvs:SRVS)[idx];if(!srv)return null;
  return d.media_type==='movie'?srv.m.replace('{id}',d.id):srv.tv.replace('{id}',d.id).replace('{s}',s).replace('{e}',e);
}
function updateSrcProg(){updateSrcProgOrdered();}
// \u2500\u2500 Ordered server list based on Arabic-first preference \u2500\u2500
function getOrderedSrvs(){
  if(S.arFirst){
    const ar=SRVS.filter(s=>s.ar);
    const rest=SRVS.filter(s=>!s.ar);
    return [...ar,...rest];
  }
  return SRVS;
}
let _orderedSrvs=[];

function tryServer(){
  clearTimeout(S.srvTimer);
  if(S.srvIdx===0) _orderedSrvs=getOrderedSrvs();
  updateSrcProgOrdered();

  if(S.srvIdx>=_orderedSrvs.length){
    setStatus('err',L('srcErr'));
    const ld=$('ld');if(ld)ld.style.display='none';
    const sm=$('srv-manual');
    if(sm){
      sm.innerHTML=`<span style="font-size:11px;color:var(--t2);width:100%">${L('manualSrc')}</span>`
        +_orderedSrvs.map((s,i)=>`<button class="srv-btn${s.ar?' style=\"border-color:rgba(34,197,94,.4)\"':''}" onclick="manualSrvByName('${s.n}')">${s.n}${s.ar?' \uD83C\uDDF8\uD83C\uDDE6':''}</button>`).join('');
      sm.classList.add('on');
    }
    document.querySelectorAll('.src-seg:not(.done)').forEach(d=>d.classList.add('fail'));
    return;
  }

  const srv=_orderedSrvs[S.srvIdx];
  const d=S.cur;
  const s=getV('ssel','1'),e=getV('esel','1');
  const url=d.media_type==='movie'
    ?srv.m.replace('{id}',d.id)
    :srv.tv.replace('{id}',d.id).replace('{s}',s).replace('{e}',e);
  if(!url){S.srvIdx++;tryServer();return;}

  setStatus('try',`${srv.n}${srv.ar?' \uD83C\uDDF8\uD83C\uDDE6':''}\u2026`);
  const ld=$('ld');if(ld)ld.style.display='flex';
  setT('ldp',`${srv.n}\u2026`);
  const f=$('vf'),currentIdx=S.srvIdx;
  f.onload=null;f.onerror=null;
  f.style.display='';f.src='about:blank';

  setTimeout(()=>{
    if(S.srvIdx!==currentIdx)return;
    f.src=url;
    // \u2500\u2500 FAST: 5 seconds per server \u2500\u2500
    S.srvTimer=setTimeout(()=>{
      if(S.srvIdx!==currentIdx)return;
      f.onload=null;f.onerror=null;S.srvIdx++;
      setStatus('try',L('srcFail'));tryServer();
    },5000);
    f.onload=()=>{
      if(S.srvIdx!==currentIdx)return;
      clearTimeout(S.srvTimer);
      try{if(!f.src||f.src==='about:blank'){S.srvIdx++;tryServer();return;}}catch(ex){}
      if(ld)ld.style.display='none';
      setStatus('ok',`\u25B6 ${srv.n}${srv.ar?' \uD83C\uDDF8\uD83C\uDDE6':''}`);
      updateSrcProgOrdered();
      const segs=document.querySelectorAll('.src-seg');
      if(segs[currentIdx]){segs[currentIdx].classList.remove('live');segs[currentIdx].classList.add('done');}
    };
    f.onerror=()=>{
      if(S.srvIdx!==currentIdx)return;
      clearTimeout(S.srvTimer);f.onload=null;f.onerror=null;
      const segs=document.querySelectorAll('.src-seg');
      if(segs[currentIdx])segs[currentIdx].classList.add('fail');
      S.srvIdx++;tryServer();
    };
  },60);
}
function updateSrcProgOrdered(){
  const sp=$('src-prog'),track=$('src-track');if(!sp||!track)return;
  sp.classList.add('on');
  track.innerHTML=_orderedSrvs.map((_,i)=>{
    let c='src-seg';
    if(i<S.srvIdx)c+=' done';
    else if(i===S.srvIdx)c+=' live';
    return `<div class="${c}" title="${_orderedSrvs[i].n}${_orderedSrvs[i].ar?' \uD83C\uDDF8\uD83C\uDDE6':''}"></div>`;
  }).join('');
}
function manualSrvByName(name){
  const idx=_orderedSrvs.findIndex(s=>s.n===name);
  if(idx<0)return;
  S.srvIdx=idx;$('srv-manual')?.classList.remove('on');clearTimeout(S.srvTimer);
  stopNativePlayer();
  const srv=_orderedSrvs[idx];
  const d=S.cur,s=getV('ssel','1'),e=getV('esel','1');
  const url=d.media_type==='movie'?srv.m.replace('{id}',d.id):srv.tv.replace('{id}',d.id).replace('{s}',s).replace('{e}',e);
  if(!url)return;
  const ld=$('ld');if(ld)ld.style.display='flex';
  setT('ldp',`${srv.n}\u2026`);setStatus('try',srv.n);updateSrcProgOrdered();
  const f=$('vf');f.style.display='';f.src=url;
  f.onload=()=>{if(ld)ld.style.display='none';setStatus('ok',`\u25B6 ${srv.n}${srv.ar?' \uD83C\uDDF8\uD83C\uDDE6':''}`);}; 
}
function manualSrv(idx){
  S.srvIdx=idx;$('srv-manual')?.classList.remove('on');clearTimeout(S.srvTimer);
  stopNativePlayer();
  const url=buildUrl(idx);if(!url)return;
  const ld=$('ld');if(ld)ld.style.display='flex';
  setT('ldp',`${SRVS[idx].n}\u2026`);setStatus('try',SRVS[idx].n);updateSrcProg();
  const f=$('vf');f.style.display='';f.src=url;
  f.onload=()=>{if(ld)ld.style.display='none';setStatus('ok',`${L('srcOk')} \u2014 ${SRVS[idx].n}`);};
}
function setupEpNav(){
  const es=$('esel');
  $('prevep').onclick=()=>{if(es.selectedIndex>0){es.selectedIndex--;S.srvIdx=0;stopNativePlayer();tryServer();}};
  $('nextep').onclick=()=>{if(es.selectedIndex<es.options.length-1){es.selectedIndex++;S.srvIdx=0;stopNativePlayer();tryServer();}};

function toggleWl(item){

  localStorage.setItem('mzwl',JSON.stringify(S.wl));refreshWlBtn(item.id,item);
}
function closePlayer(){
  clearTimeout(S.srvTimer);exitFS();stopNativePlayer();

// FULLSCREEN
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function toggleFS(){
  const f=$('vwrap');
  const req=f.requestFullscreen||f.webkitRequestFullscreen||f.mozRequestFullScreen||f.msRequestFullscreen;
  if(req&&(document.fullscreenEnabled||document.webkitFullscreenEnabled)){
    if(!document.fullscreenElement&&!document.webkitFullscreenElement)req.call(f).catch(()=>toggleCssFS());
    else{if(document.exitFullscreen)document.exitFullscreen().catch(()=>{});else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}
    return;
  }
  toggleCssFS();
}
function toggleCssFS(){
  const vw=$('vwrap');const on=vw.classList.toggle('fs-on');
  $('fs-exp').style.display=on?'none':'block';$('fs-col').style.display=on?'block':'none';
  document.body.style.overflow=on?'hidden':'';
  if(on){try{screen.orientation.lock('landscape').catch(()=>{});}catch(e){}}
  else{try{screen.orientation.unlock();}catch(e){}}
}
function exitFS(){
  const vw=$('vwrap');if(vw&&vw.classList.contains('fs-on'))toggleCssFS();
  if(document.fullscreenElement||document.webkitFullscreenElement){if(document.exitFullscreen)document.exitFullscreen().catch(()=>{});else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}
}
['fullscreenchange','webkitfullscreenchange'].forEach(ev=>document.addEventListener(ev,()=>{
  const on=!!(document.fullscreenElement||document.webkitFullscreenElement);
  const e=$('fs-exp'),c=$('fs-col');if(e)e.style.display=on?'none':'block';if(c)c.style.display=on?'block':'none';
}));

function shareAct(type){
  const title=_detData?(_detData.title||_detData.name||''):(S.cur?.title||S.cur?.name||'Mz Cinema');
  const url=window.location.href;
  closeShare();
  if(type==='copy')navigator.clipboard?.writeText(url).then(()=>toast('\u2713 '+L('copyLink'))).catch(()=>toast(url));
  else if(type==='whatsapp')window.open(`https://wa.me/?text=${encodeURIComponent('\uD83C\uDFAC '+title+' \u2014 '+url)}`,'_blank');
  else if(type==='twitter')window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('\uD83C\uDFAC '+title)}&url=${encodeURIComponent(url)}`,'_blank');
  else if(type==='native'){if(navigator.share)navigator.share({title,url}).catch(()=>{});else navigator.clipboard?.writeText(url).then(()=>toast('\u2713 '+L('copyLink')));}
}

function clearFilters(){
  ['sf-type','sf-genre','sf-sort','sf-from','sf-origlang'].forEach(id=>{const el=$(id);if(!el)return;if(el.tagName==='SELECT')el.value=id==='sf-type'?'multi':id==='sf-sort'?'popularity.desc':'';else el.value='';});

  const q=getV('si','').trim();if(q)doSearch(q);else renderSrEmpty(L('startSearch'));

async function applyFilters(){await doSearch(getV('si','').trim());}
async function doSearch(q){
  const res=$('sr'),cntEl=$('sr-count');
  const type=getV('sf-type','multi'),genre=getV('sf-genre',''),sort=getV('sf-sort','popularity.desc'),from=getV('sf-from',''),lang=getV('sf-origlang','');
  $('chip-type')?.classList.toggle('on',type!=='multi');$('chip-genre')?.classList.toggle('on',!!genre);$('chip-lang')?.classList.toggle('on',!!lang);$('chip-year')?.classList.toggle('on',!!from);
  if(res)res.innerHTML='<div class="sr-empty"><div class="spinner" style="margin:0 auto"></div></div>';
  if(cntEl)cntEl.style.display='none';
  let results=[];
  try{
    if(genre||from||lang||!q){
      const dt=type==='multi'?'movie':type;
      let ep=`discover/${dt}?sort_by=${sort}&`;
      if(genre)ep+=`with_genres=${genre}&`;if(lang)ep+=`with_original_language=${lang}&`;
      if(from)ep+=`primary_release_date.gte=${from}-01-01&`;ep+='vote_count.gte=5&';
      const d=await api(ep);results=d.results||[];
      if(type==='multi'){let ep2=`discover/tv?sort_by=${sort}&`;if(genre)ep2+=`with_genres=${genre}&`;if(lang)ep2+=`with_original_language=${lang}&`;if(from)ep2+=`first_air_date.gte=${from}-01-01&`;const d2=await api(ep2);results=[...results,...(d2.results||[])].sort((a,b)=>b.popularity-a.popularity);}
    }else{
      const ep=type==='multi'?`search/multi?query=${encodeURIComponent(q)}&`:`search/${type}?query=${encodeURIComponent(q)}&`;
      const d=await api(ep);results=d.results||[];
      if(from)results=results.filter(i=>parseInt((i.release_date||i.first_air_date||'0').split('-')[0])>=parseInt(from));
      if(lang)results=results.filter(i=>i.original_language===lang);
      if(genre)results=results.filter(i=>i.genre_ids?.includes(parseInt(genre)));
    }
  }catch(e){console.error(e);}
  results=results.filter(i=>i.poster_path||i.profile_path);
  if(!results.length){renderSrEmpty(L('noResults'));return;}
  if(cntEl){cntEl.style.display='block';cntEl.textContent=`${results.length} ${L('results')}`;}
  const people=results.filter(i=>i.media_type==='person'||(!i.title&&!i.name&&i.profile_path));
  const titles=results.filter(i=>i.media_type!=='person'&&(i.title||i.name));
  let html='';
  if(titles.length){
    if(people.length)html+=`<div class="sr-group-label">${L('movies')} & ${L('series')}</div>`;
    html+=titles.map(i=>{
      const t=i.media_type||(i.title?'movie':'tv');
      const yr=(i.release_date||i.first_air_date||'').split('-')[0];
      const safe=(i.title||i.name||'').replace(/"/g,'&quot;');
      return `<div class="sr-row" role="button" tabindex="0" onclick="openDetail(${i.id},'${t}');closeSearch()" onkeydown="if(event.key==='Enter')this.click()">
        <img class="sr-poster" src="${i.poster_path?IMG+i.poster_path:'https://placehold.co/46x69/161628/444?text=?'}" alt="${safe}" loading="lazy" decoding="async">

  closeSrvPanel();
  if(!S.cur)return;

const ODB='mz-offline-v1',OSTORE='media';
async function openODB(){return new Promise((res,rej)=>{const r=indexedDB.open(ODB,1);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(OSTORE))db.createObjectStore(OSTORE,{keyPath:'id'});};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});}
async function saveOItem(item){const db=await openODB();return new Promise((res,rej)=>{const tx=db.transaction(OSTORE,'readwrite');tx.objectStore(OSTORE).put(item);tx.oncomplete=()=>res(true);tx.onerror=e=>rej(e.target.error);});}
async function getOItems(){const db=await openODB();return new Promise((res,rej)=>{const tx=db.transaction(OSTORE,'readonly');const r=tx.objectStore(OSTORE).getAll();r.onsuccess=e=>res(e.target.result||[]);r.onerror=e=>rej(e.target.error);});}
async function deleteOItem(id){const db=await openODB();return new Promise((res,rej)=>{const tx=db.transaction(OSTORE,'readwrite');tx.objectStore(OSTORE).delete(id);tx.oncomplete=()=>res(true);tx.onerror=e=>rej(e.target.error);});}
